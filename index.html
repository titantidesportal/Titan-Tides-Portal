    <input
      type="password"
      id="pw-input"
      placeholder="Enter password"
      autocomplete="current-password"
      style="
        width:100%;padding:14px 16px;font-size:16px;
        border:1.5px solid rgba(92,198,230,0.3);border-radius:12px;
        background:rgba(255,255,255,0.08);color:#fff;
        outline:none;margin-bottom:10px;text-align:center;

    <div id="pw-error" style="color:#E08A3C;font-size:13px;text-align:center;margin-bottom:10px;min-height:18px;"></div>
    <button onclick="checkPassword()" style="
      width:100%;padding:14px;font-size:15px;font-weight:700;
      background:#1FA9D1;color:#04222B;border:none;border-radius:12px;
      cursor:pointer;letter-spacing:0.04em;font-family:'Archivo',sans-serif;
    ">Sign in to portal</button>

<script>
function checkPassword() {
  const input = document.getElementById('pw-input').value;
  const error = document.getElementById('pw-error');
  if (input === 'zBT1-DD6*JpH') {
    sessionStorage.setItem('tt-auth', '1');
    document.getElementById('password-screen').style.display = 'none';
    error.textContent = '';
  } else {
    error.textContent = 'Incorrect password. Please try again.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.addEventListener('DOMContentLoaded', function() {
  var input = document.getElementById('pw-input');
  if (input) {
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') checkPassword(); });
  }
  if (sessionStorage.getItem('tt-auth') === '1') {
    document.getElementById('password-screen').style.display = 'none';
  }
});
</script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

593b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"b8e2bd6c-ac8a-42e8-a45d-add35ce05a41\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{font-family:'IBM Plex Sans',system-ui,sans-serif;color:#0F1A1F;background:#EEF2F4;-webkit-font-smoothing:antialiased}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:#c4ced3;border-radius:8px;border:2px solid #EEF2F4}\n  ::placeholder{color:#9AA8AE}\n  input,button,select{font-family:inherit}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh\">\n\n  <!-- ================= LOGIN ================= -->\n  <sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:100vh;display:grid;grid-template-columns:1.05fr 0.95fr\">\n    <!-- brand panel -->\n    <div style=\"position:relative;background:linear-gradient(160deg,#0B161B 0%,#10242C 55%,#0B3845 100%);overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;padding:52px 56px;color:#fff\">\n      <div style=\"position:absolute;right:-120px;top:40px;width:620px;height:620px;opacity:.13;background:url(&quot;a98c9018-34f2-47e4-b942-9a2d806ac4be&quot;) center/contain no-repeat;pointer-events:none\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;position:relative\">\n        <img src=\"a98c9018-34f2-47e4-b942-9a2d806ac4be\" style=\"height:46px;width:auto\" alt=\"Titan Tides\">\n        <div style=\"line-height:1\">\n          <div style=\"font-family:'Archivo';font-weight:800;letter-spacing:.14em;font-size:18px\">TITAN TIDES<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:600;letter-spacing:.42em;font-size:10px;color:#5CC6E6;margin-top:3px\">LOGISTICS<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;max-width:460px\">\n        <div style=\"font-family:'Archivo';font-weight:800;font-size:46px;line-height:1.05;letter-spacing:-0.01em\">One platform for every shipment.<\u002Fdiv>\n        <p style=\"margin-top:22px;font-size:16px;line-height:1.6;color:#A9BFC8;max-width:400px\">Documents, photos and full history for your cargo — cars, containers, machinery and more — without the endless email attachments and Google links.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:relative;font-family:'Archivo';font-weight:600;font-size:13px;letter-spacing:.08em;color:#5CC6E6\">HARNESSING STRENGTH, NAVIGATING CHANGE<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- form panel -->\n    <div style=\"display:flex;align-items:center;justify-content:center;padding:40px;background:#fff\">\n      <div style=\"width:100%;max-width:380px\">\n        <div style=\"font-family:'Archivo';font-weight:800;font-size:26px\">Sign in<\u002Fdiv>\n        <p style=\"color:#5A6B72;margin-top:8px;font-size:14px\">Access your shipments, documents and photos.<\u002Fp>\n\n        <div style=\"margin-top:28px;font-size:12px;font-weight:600;letter-spacing:.06em;color:#5A6B72;text-transform:uppercase\">I'm signing in as<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px\">\n          <sc-for list=\"{{ roles }}\" as=\"r\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ r.pick }}\" style=\"{{ r.btnStyle }}\">\n              <div style=\"font-weight:700;font-size:13px\">{{ r.label }}<\u002Fdiv>\n              <div style=\"font-size:10px;margin-top:3px;opacity:.7\">{{ r.sub }}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:22px\">\n          <label style=\"font-size:12px;font-weight:600;color:#3A4A50\">Username<\u002Flabel>\n          <input value=\"{{ loginUser }}\" placeholder=\"username\" style=\"width:100%;margin-top:6px;padding:12px 14px;border:1.5px solid #D6DEE2;border-radius:10px;font-size:14px;outline:none\">\n        <\u002Fdiv>\n        <div style=\"margin-top:14px\">\n          <label style=\"font-size:12px;font-weight:600;color:#3A4A50\">Password<\u002Flabel>\n          <input type=\"password\" value=\"••••••••\" style=\"width:100%;margin-top:6px;padding:12px 14px;border:1.5px solid #D6DEE2;border-radius:10px;font-size:14px;outline:none\">\n        <\u002Fdiv>\n        <button onclick=\"{{ signIn }}\" style=\"width:100%;margin-top:22px;padding:13px;border:none;border-radius:10px;background:#0F1A1F;color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:'Archivo'\">Sign in to portal<\u002Fbutton>\n        <div style=\"display:flex;justify-content:space-between;margin-top:16px;font-size:12.5px;color:#5A6B72\">\n          <label style=\"display:flex;align-items:center;gap:7px;cursor:pointer\"><input type=\"checkbox\" checked=\"\"> Remember me<\u002Flabel>\n          <a style=\"color:#1391B8;text-decoration:none;cursor:pointer\">Forgotten password?<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"margin-top:26px;padding:11px 13px;background:#F0FAFD;border:1px solid #CDEEF7;border-radius:9px;font-size:11.5px;color:#3A6470;line-height:1.5\">Demo — pick a role above and press <b>Sign in<\u002Fb>. Each role sees a different set of shipments.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= APP ================= -->\n  <sc-if value=\"{{ isApp }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <!-- top bar -->\n    <div style=\"position:sticky;top:0;z-index:30;background:#0F1A1F;color:#fff;display:flex;align-items:center;gap:20px;padding:0 26px;height:62px\">\n      <div onclick=\"{{ goList }}\" style=\"display:flex;align-items:center;gap:11px;cursor:pointer\">\n        <img src=\"a98c9018-34f2-47e4-b942-9a2d806ac4be\" style=\"height:30px\" alt=\"\">\n        <div style=\"line-height:1\"><span style=\"font-family:'Archivo';font-weight:800;letter-spacing:.12em;font-size:15px\">TITAN TIDES<\u002Fspan><span style=\"font-family:'Archivo';font-weight:600;letter-spacing:.3em;font-size:8px;color:#5CC6E6;display:block;margin-top:2px\">LOGISTICS PORTAL<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <div style=\"position:relative;width:300px;max-width:34vw\">\n        <input value=\"{{ search }}\" onchange=\"{{ onSearch }}\" placeholder=\"Search file ref, container, vessel…\" style=\"width:100%;padding:9px 14px 9px 38px;border-radius:9px;border:1px solid #2A3A41;background:#16262D;color:#fff;font-size:13px;outline:none\">\n        <span style=\"position:absolute;left:13px;top:9px;color:#5A7178\">⌕<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;padding-left:8px;border-left:1px solid #25353C;margin-left:4px\">\n        <div style=\"width:34px;height:34px;border-radius:50%;background:#1FA9D1;color:#04222B;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;font-family:'Archivo'\">{{ user.initials }}<\u002Fdiv>\n        <div style=\"line-height:1.2\">\n          <div style=\"font-size:13px;font-weight:600\">{{ user.name }}<\u002Fdiv>\n          <div style=\"font-size:10.5px;color:#7F949B\">{{ user.roleLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ logout }}\" title=\"Sign out\" style=\"margin-left:6px;background:none;border:1px solid #2A3A41;color:#9FB4BB;border-radius:8px;padding:7px 11px;font-size:12px;cursor:pointer\">Logout<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== LIST VIEW ===== -->\n    <sc-if value=\"{{ isList }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:28px 26px 60px\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px\">\n        <div>\n          <div style=\"font-family:'Archivo';font-weight:800;font-size:27px;letter-spacing:-0.01em\">Shipments<\u002Fdiv>\n          <p style=\"color:#5A6B72;margin-top:5px;font-size:14px\">{{ listSubtitle }}<\u002Fp>\n        <\u002Fdiv>\n        <sc-if value=\"{{ canUpload }}\" hint-placeholder-val=\"{{ false }}\">\n          <button style=\"background:#0F1A1F;color:#fff;border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:'Archivo'\">+ New shipment<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- stat cards -->\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:22px\">\n        <sc-for list=\"{{ stats }}\" as=\"st\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:14px;padding:16px 18px\">\n            <div style=\"font-size:12px;color:#6A7B82;font-weight:600\">{{ st.label }}<\u002Fdiv>\n            <div style=\"font-family:'Archivo';font-weight:800;font-size:30px;margin-top:6px;line-height:1\">{{ st.value }}<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:{{ st.tint }};margin-top:6px;font-weight:600\">{{ st.note }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- filter chips -->\n      <div style=\"display:flex;gap:8px;margin-top:26px;flex-wrap:wrap\">\n        <sc-for list=\"{{ commodityChips }}\" as=\"c\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ c.pick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- shipment cards -->\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;margin-top:18px\">\n        <sc-for list=\"{{ visibleShipments }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ s.open }}\" style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s;display:flex;flex-direction:column\" style-hover=\"box-shadow:0 10px 30px rgba(15,26,31,.10);transform:translateY(-2px)\">\n            <div style=\"height:118px;position:relative;{{ s.heroBg }}\">\n              <div style=\"position:absolute;left:14px;top:12px;display:flex;gap:7px;align-items:center\">\n                <span style=\"background:rgba(255,255,255,.92);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px\">{{ s.icon }} {{ s.commodityLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"position:absolute;right:14px;top:12px;background:{{ s.accent }};color:#fff;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700\">{{ s.status }}<\u002Fdiv>\n              <div style=\"position:absolute;left:14px;bottom:11px;color:#fff;font-family:'IBM Plex Mono';font-size:12px;font-weight:500;background:rgba(8,20,24,.55);padding:3px 8px;border-radius:6px\">{{ s.fileRef }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:15px 17px 17px;flex:1;display:flex;flex-direction:column\">\n              <div style=\"font-family:'Archivo';font-weight:700;font-size:16.5px;line-height:1.25\">{{ s.title }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:9px;margin-top:11px;font-size:13px;color:#41535A;font-weight:600\">\n                <span>{{ s.pol }}<\u002Fspan>\n                <span style=\"flex:1;height:1px;background:repeating-linear-gradient(90deg,#C2CED3 0 6px,transparent 6px 11px);position:relative\"><\u002Fspan>\n                <span style=\"color:#1391B8\">{{ s.pod }}<\u002Fspan>\n              <\u002Fdiv>\n              <!-- progress -->\n              <div style=\"margin-top:14px;height:6px;background:#EAEFF1;border-radius:5px;overflow:hidden\">\n                <div style=\"height:100%;width:{{ s.progress }};background:{{ s.accent }};border-radius:5px\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;margin-top:13px;padding-top:13px;border-top:1px solid #EEF2F4;font-size:12px\">\n                <div><div style=\"color:#8494 9A;color:#8A989E\">Vessel / ETA<\u002Fdiv><div style=\"font-weight:600;margin-top:2px\">{{ s.vessel }} · {{ s.eta }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:right\"><div style=\"color:#8A989E\">Documents<\u002Fdiv><div style=\"font-weight:600;margin-top:2px\">{{ s.docCount }} files · {{ s.photoCount }} photos<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== DETAIL VIEW ===== -->\n    <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n    <div>\n      <!-- detail hero -->\n      <div style=\"{{ sel.heroBg }};border-bottom:1px solid #E4EAED\">\n        <div style=\"max-width:1180px;margin:0 auto;padding:18px 26px 0\">\n          <button onclick=\"{{ goList }}\" style=\"background:rgba(255,255,255,.9);border:none;border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;color:#33454C\">← All shipments<\u002Fbutton>\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;padding:18px 0 20px\">\n            <div>\n              <div style=\"display:flex;align-items:center;gap:10px\">\n                <span style=\"background:rgba(255,255,255,.92);border-radius:8px;padding:5px 11px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px\">{{ sel.icon }} {{ sel.commodityLabel }}<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono';font-size:13px;background:rgba(8,20,24,.55);color:#fff;padding:4px 9px;border-radius:6px\">{{ sel.fileRef }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-family:'Archivo';font-weight:800;font-size:28px;margin-top:13px;letter-spacing:-0.01em\">{{ sel.title }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px;margin-top:10px;font-size:14px;color:#33454C;font-weight:600\">\n                <span>{{ sel.pol }}<\u002Fspan>\n                <span style=\"width:90px;height:1px;background:repeating-linear-gradient(90deg,#8DA3AB 0 6px,transparent 6px 11px)\"><\u002Fspan>\n                <span style=\"color:#0E6E8C\">{{ sel.pod }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:right\">\n              <div style=\"background:{{ sel.accent }};color:#fff;border-radius:9px;padding:8px 15px;font-weight:700;font-size:14px;display:inline-block;font-family:'Archivo'\">{{ sel.status }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#41535A;margin-top:9px\">ETA {{ sel.eta }} · {{ sel.daysNote }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- tabs -->\n          <div style=\"display:flex;gap:4px\">\n            <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ t.pick }}\" style=\"{{ t.style }}\">{{ t.label }}<sc-if value=\"{{ t.badge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:7px;background:{{ t.badgeBg }};color:{{ t.badgeColor }};border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700\">{{ t.badge }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"max-width:1180px;margin:0 auto;padding:26px 26px 70px\">\n\n        <!-- OVERVIEW -->\n        <sc-if value=\"{{ tabOverview }}\" hint-placeholder-val=\"{{ true }}\">\n        <div>\n          <!-- progress tracker -->\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;padding:22px 24px\">\n            <div style=\"font-family:'Archivo';font-weight:700;font-size:14px;color:#33454C;margin-bottom:18px\">Shipment progress<\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-start\">\n              <sc-for list=\"{{ sel.track }}\" as=\"step\" hint-placeholder-count=\"6\">\n                <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;position:relative;text-align:center\">\n                  <div style=\"position:absolute;top:13px;left:-50%;width:100%;height:3px;background:{{ step.lineColor }};z-index:0;display:{{ step.lineDisplay }}\"><\u002Fdiv>\n                  <div style=\"width:28px;height:28px;border-radius:50%;background:{{ step.dotBg }};border:3px solid {{ step.dotBorder }};z-index:1;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700\">{{ step.mark }}<\u002Fdiv>\n                  <div style=\"font-size:11.5px;font-weight:600;margin-top:9px;color:{{ step.textColor }};max-width:88px;line-height:1.3\">{{ step.label }}<\u002Fdiv>\n                  <div style=\"font-size:10.5px;color:#9AA8AE;margin-top:3px\">{{ step.date }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- vehicle banner (cars only) -->\n          <sc-if value=\"{{ sel.isVehicle }}\" hint-placeholder-val=\"{{ false }}\">\n            <div onclick=\"{{ openVehicleTab }}\" style=\"margin-top:16px;background:linear-gradient(100deg,#0F1A1F,#13343f);color:#fff;border-radius:16px;padding:18px 22px;display:flex;align-items:center;gap:18px;cursor:pointer\">\n              <div style=\"font-size:30px\">🚗<\u002Fdiv>\n              <div style=\"flex:1\">\n                <div style=\"font-family:'Archivo';font-weight:700;font-size:16px\">{{ sel.vehicle.headline }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#9FC3D0;margin-top:3px\">VIN {{ sel.vehicle.chassis }} · {{ sel.vehicle.colour }} · {{ sel.vehicle.engine }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#1FA9D1;color:#04222B;border-radius:9px;padding:9px 15px;font-weight:700;font-size:13px;font-family:'Archivo'\">Open vehicle file →<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- info grid -->\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px\">\n            <sc-for list=\"{{ sel.infoCards }}\" as=\"card\" hint-placeholder-count=\"3\">\n              <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;padding:20px 22px\">\n                <div style=\"font-family:'Archivo';font-weight:700;font-size:14px;color:#1391B8;margin-bottom:14px\">{{ card.title }}<\u002Fdiv>\n                <sc-for list=\"{{ card.rows }}\" as=\"row\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px dashed #EDF1F3;font-size:13px\">\n                    <span style=\"color:#74858B\">{{ row.k }}<\u002Fspan>\n                    <span style=\"font-weight:600;text-align:right\">{{ row.v }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- DOCUMENTS -->\n        <sc-if value=\"{{ tabDocs }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px\">\n            <div style=\"font-family:'Archivo';font-weight:700;font-size:18px\">Documents <span style=\"color:#9AA8AE;font-weight:600\">({{ sel.docCount }})<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:8px\">\n              <button style=\"background:#fff;border:1px solid #D6DEE2;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer\">Download all (.zip)<\u002Fbutton>\n              <sc-if value=\"{{ canUpload }}\" hint-placeholder-val=\"{{ false }}\"><button style=\"background:#0F1A1F;color:#fff;border:none;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Archivo'\">+ Upload<\u002Fbutton><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;overflow:hidden\">\n            <div style=\"display:grid;grid-template-columns:48px 1fr 120px 130px 120px;gap:12px;padding:13px 20px;background:#F6F9FA;font-size:11.5px;font-weight:700;color:#74858B;text-transform:uppercase;letter-spacing:.04em\">\n              <div><\u002Fdiv><div>Document<\u002Fdiv><div>Type<\u002Fdiv><div>Modified<\u002Fdiv><div style=\"text-align:right\">Action<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ sel.documents }}\" as=\"d\" hint-placeholder-count=\"5\">\n              <div style=\"display:grid;grid-template-columns:48px 1fr 120px 130px 120px;gap:12px;padding:14px 20px;border-top:1px solid #F0F3F5;align-items:center;font-size:13.5px\">\n                <div style=\"width:34px;height:34px;border-radius:8px;background:{{ d.iconBg }};color:{{ d.iconColor }};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;font-family:'Archivo'\">{{ d.ext }}<\u002Fdiv>\n                <div><div style=\"font-weight:600\">{{ d.name }}<\u002Fdiv><div style=\"font-size:11.5px;color:#9AA8AE;margin-top:2px\">{{ d.size }}<\u002Fdiv><\u002Fdiv>\n                <div><span style=\"background:{{ d.catBg }};color:{{ d.catColor }};border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600\">{{ d.category }}<\u002Fspan><\u002Fdiv>\n                <div style=\"color:#74858B;font-size:12.5px\">{{ d.modified }}<\u002Fdiv>\n                <div style=\"text-align:right\"><a style=\"color:#1391B8;font-weight:600;text-decoration:none;cursor:pointer\">Download<\u002Fa><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- PHOTOS -->\n        <sc-if value=\"{{ tabPhotos }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:8px\">\n            <div style=\"font-family:'Archivo';font-weight:700;font-size:18px\">Photos <span style=\"color:#9AA8AE;font-weight:600\">({{ sel.photoCount }})<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:8px\">\n              <button style=\"background:#fff;border:1px solid #D6DEE2;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer\">Download all<\u002Fbutton>\n              <sc-if value=\"{{ canUpload }}\" hint-placeholder-val=\"{{ false }}\"><button onclick=\"{{ openUpload }}\" style=\"background:#0F1A1F;color:#fff;border:none;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Archivo'\">+ Add photos<\u002Fbutton><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"color:#5A6B72;font-size:13.5px;margin-bottom:20px\">All photos live here on the platform — no more chasing Google Drive links.<\u002Fp>\n          <sc-for list=\"{{ sel.photoGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n            <div style=\"margin-bottom:26px\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:12px\">\n                <span style=\"width:9px;height:9px;border-radius:50%;background:{{ g.dot }}\"><\u002Fspan>\n                <span style=\"font-family:'Archivo';font-weight:700;font-size:14px\">{{ g.stage }}<\u002Fspan>\n                <span style=\"font-size:12px;color:#9AA8AE\">· t:800;font-size:22px\">{{ sel.vehicle.headline }}<\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:0 22px;margin-top:14px\">\n                  <sc-for list=\"{{ sel.vehicle.specs }}\" as=\"v\" hint-placeholder-count=\"6\">\n                    <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed #EDF1F3;font-size:13px\">\n                      <span style=\"color:#74858B\">{{ v.k }}<\u002Fspan><span style=\"font-weight:600\">{{ v.v }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;padding:20px 22px\">\n              <div style=\"font-family:'Archivo';font-weight:700;font-size:14px;color:#1391B8;margin-bottom:6px\">Condition check sheets<\u002Fdiv>\n              <p style=\"font-size:12.5px;color:#74858B;margin-bottom:14px\">Damage noted at each handover, with matching photos.<\u002Fp>\n              <sc-for list=\"{{ sel.vehicle.checks }}\" as=\"ch\" hint-placeholder-count=\"3\">\n                <div style=\"border:1px solid #EAEFF1;border-radius:12px;padding:13px 15px;margin-bottom:10px\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:center\">\n                    <div style=\"font-weight:700;font-size:13.5px\">{{ ch.location }}<\u002Fdiv>\n                    <span style=\"background:{{ ch.tagBg }};color:{{ ch.tagColor }};border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700\">{{ ch.tag }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size:12px;color:#74858B;margin-top:6px\">{{ ch.note }}<\u002Fdiv>\n                  <div style=\"display:flex;gap:6px;margin-top:10px\">\n                    <sc-for list=\"{{ ch.thumbs }}\" as=\"th\" hint-placeholder-count=\"3\">\n                      <div onclick=\"{{ th.open }}\" style=\"width:54px;height:42px;border-radius:7px;{{ th.bg }};cursor:pointer;border:1px solid #E4EAED\"><\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- HISTORY -->\n        <sc-if value=\"{{ tabHistory }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;margin-bottom:18px\">Shipment history<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;padding:8px 26px 8px\">\n            <sc-for list=\"{{ sel.history }}\" as=\"h\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;gap:18px;padding:16px 0;border-bottom:1px solid #F0F3F5\">\n                <div style=\"width:118px;flex-shrink:0;text-align:right;font-size:12px;color:#74858B;padding-top:2px\">{{ h.date }}<div style=\"font-size:11px;color:#A8B4B9\">{{ h.time }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"position:relative;display:flex;flex-direction:column;align-items:center\"><span style=\"width:12px;height:12px;border-radius:50%;background:{{ h.dot }};border:3px solid #fff;box-shadow:0 0 0 1.5px {{ h.dot }}\"><\u002Fspan><span style=\"flex:1;width:2px;background:#E4EAED;margin-top:3px\"><\u002Fspan><\u002Fdiv>\n                <div style=\"padding-bottom:4px\"><div style=\"font-weight:600;font-size:14px\">{{ h.event }}<\u002Fdiv><div style=\"font-size:12.5px;color:#74858B;margin-top:3px\">{{ h.detail }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- UPLOAD MODAL -->\n    <sc-if value=\"{{ uploadOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ closeUpload }}\" style=\"position:fixed;inset:0;z-index:55;background:rgba(8,16,20,.6);display:flex;align-items:center;justify-content:center;padding:32px\">\n        <div onclick=\"{{ stop }}\" style=\"background:#fff;border-radius:18px;width:100%;max-width:560px;max-height:88vh;overflow:auto;box-shadow:0 24px 70px rgba(0,0,0,.3)\">\n          <div style=\"padding:22px 24px;border-bottom:1px solid #EEF2F4;display:flex;justify-content:space-between;align-items:center\">\n            <div>\n              <div style=\"font-family:'Archivo';font-weight:800;font-size:18px\">Add photos<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#74858B;margin-top:3px\">{{ sel.fileRef }} · {{ sel.title }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ closeUpload }}\" style=\"background:#F0F3F5;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:15px;color:#5A6B72\">✕<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"padding:22px 24px\">\n            <div style=\"font-size:12px;font-weight:600;color:#3A4A50;margin-bottom:7px\">Shipment stage<\u002Fdiv>\n            <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px\">\n              <sc-for list=\"{{ stageOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ o.pick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <label ondragover=\"{{ onDragOver }}\" ondrop=\"{{ onDrop }}\" style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:2px dashed {{ dropBorder }};border-radius:14px;padding:34px 20px;cursor:pointer;background:{{ dropBg }};text-align:center;transition:.15s\">\n              <div style=\"font-size:30px\">📷<\u002Fdiv>\n              <div style=\"font-weight:700;font-size:14.5px;font-family:'Archivo'\">Drag photos here or click to browse<\u002Fdiv>\n              <div style=\"font-size:12px;color:#8A989E\">JPG / PNG · multiple files supported<\u002Fdiv>\n              <input type=\"file\" accept=\"image/*\" multiple=\"\" onchange=\"{{ onFiles }}\" style=\"display:none\">\n            <\u002Flabel>\n\n            <sc-if value=\"{{ hasDraft }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:18px\">\n                <div style=\"font-size:12px;font-weight:600;color:#3A4A50;margin-bottom:9px\">{{ draftLabel }}<\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:9px\">\n                  <sc-for list=\"{{ draftPhotos }}\" as=\"dp\" hint-placeholder-count=\"3\">\n                    <div style=\"position:relative;border-radius:10px;overflow:hidden;height:74px;border:1px solid #E4EAED;background-size:cover;background-position:center;{{ dp.style }}\">\n                      <button onclick=\"{{ dp.remove }}\" style=\"position:absolute;top:4px;right:4px;background:rgba(8,16,20,.7);color:#fff;border:none;border-radius:6px;width:22px;height:22px;cursor:pointer;font-size:12px\">✕<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"padding:16px 24px;border-top:1px solid #EEF2F4;display:flex;justify-content:flex-end;gap:9px\">\n            <button onclick=\"{{ closeUpload }}\" style=\"background:#fff;border:1px solid #D6DEE2;border-radius:9px;padding:10px 17px;font-weight:600;font-size:13.5px;cursor:pointer\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ saveUpload }}\" style=\"background:{{ saveBg }};color:#fff;border:none;border-radius:9px;padding:10px 18px;font-weight:700;font-size:13.5px;cursor:{{ saveCursor }};font-family:'Archivo'\">{{ saveLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- LIGHTBOX -->\n    <sc-if value=\"{{ lightboxOpen }}\" hint-placehol =>{ this.setState(s=>({draft:[...s.draft,{url:r.result,name:f.name}]})); };\n      r.readAsDataURL(f);\n    });\n  }\n\n  // ----- palette helpers -----\n  P(){ return { accent:'#1FA9D1', ink:'#0F1A1F' }; }\n  statusInfo(s){\n    const m={\n      'Booked':'#8A6FE0','Collected':'#E08A3C','At origin port':'#D6A21E',\n      'On vessel':'#1FA9D1','In transit':'#1391B8','Arrived':'#2BA66A',\n      'Cleared':'#2BA66A','Delivered':'#46A05A'\n    };\n    return m[s]||'#1FA9D1';\n  }\n  hero(commodity){\n    const map={\n      vehicle:'linear-gradient(135deg,#1b2f38,#0f1a1f)',\n      general:'linear-gradient(135deg,#143b46,#0f2127)',\n      machinery:'linear-gradient(135deg,#2a2330,#15131a)',\n      effects:'linear-gradient(135deg,#16323a,#0f2127)',\n      reefer:'linear-gradient(135deg,#103b3a,#0f2127)'\n    };\n    const base = map[commodity]||map.general;\n    return 'background:'+base;\n  }\n  tile(seed){\n    const hue=(seed*47)%360;\n    return `background:linear-gradient(135deg,hsl(${hue} 32% 58%),hsl(${(hue+40)%360} 38% 38%));background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.10) 0 10px,transparent 10px 20px),linear-gradient(135deg,hsl(${hue} 32% 56%),hsl(${(hue+40)%360} 40% 36%))`;\n  }\n  icon(c){ return {vehicle:'🚗',general:'📦',machinery:'⚙️',effects:'🏠',reefer:'❄️'}[c]||'📦'; }\n  cLabel(c){ return {vehicle:'Vehicle',general:'General cargo',machinery:'Machinery',effects:'Personal effects',reefer:'Reefer'}[c]||'Cargo'; }\n\n  data(){\n    if(this._d) return this._d;\n    const mk=(o)=>o;\n    this._d=[\n      mk({id:'a',fileRef:'TT-2026-0418',commodity:'vehicle',title:'Land Rover Defender 110',pol:'Cape Town',pod:'Southampton',vessel:'MV Maipo',etd:'12 Apr 2026',eta:'27 May 2026',status:'On vessel',progress:55,\n        client:'Acme Imports',agent:'Cape Reading Agency',container:'TCLU 227 8853',seal:'ML-ZA6658118',bl:'CRA260554826',pol2:'CAPE TOWN',pod2:'SOUTHAMPTON',contType:\"1 × 20' Container\",\n        collFrom:'P&M Packing, Cape Town',deliverTo:'A. Meadows, Debach UK',vehicle:{make:'Land Rover',model:'Defender 110',year:'2022',chassis:'SALLDHMR7GA480249',engine:'2.0L D240',colour:'Santorini Black'},\n        docs:5,photos:8}),\n      mk({id:'b',fileRef:'TT-2026-0392',commodity:'vehicle',title:'Porsche 911 Carrera S',pol:'Durban',pod:'Felixstowe',vessel:'MV Höegh Trove',etd:'02 Mar 2026',eta:'09 Apr 2026',status:'In transit',progress:68,\n        client:'Acme Imports',agent:'Cape Reading Agency',container:'RORO',seal:'—',bl:'CRA251154111',pol2:'DURBAN',pod2:'FELIXSTOWE',contType:'RoRo',\n        collFrom:'Pristine Classic Cars',deliverTo:'M. Palmer, Cape Town',vehicle:{make:'Porsche',model:'911 Carrera S',year:'2021',chassis:'WP0ZZZ99ZMS210447',engine:'3.0L Twin-Turbo',colour:'Guards Red'},\n        docs:6,photos:12}),\n      mk({id:'c',fileRef:'TT-2026-0377',commodity:'general',title:'Palletised retail goods · 2×40′',pol:'Cape Town',pod:'Rotterdam',vessel:'MSC Aliya',etd:'18 Jan 2026',eta:'21 Feb 2026',status:'Arrived',progress:88,\n        client:'Acme Imports',agent:'Harbour Point Forwarding',container:'MSCU 884 1209',seal:'SA-7782341',bl:'HPF251053951',pol2:'CAPE TOWN',pod2:'ROTTERDAM',contType:\"2 × 40' HC\",\n        collFrom:'Stellenbosch DC',deliverTo:'Rotterdam Bonded Wh.',docs:7,photos:6}),\n      mk({id:'d',fileRef:'TT-2026-0351',commodity:'machinery',title:'CNC milling machine (crated)',pol:'Johannesburg',pod:'Hamburg',vessel:'MV Grande Africa',etd:'05 Dec 2025',eta:'14 Jan 2026',status:'Cleared',progress:95,\n        client:'Vortex Mfg',agent:'Cape Reading Agency',container:'GCXU 249 0846',seal:'DE-110287',bl:'CRA250753524',pol2:'JOHANNESBURG',pod2:'HAMBURG',contType:\"1 × 40' Flat Rack\",\n        collFrom:'Vortex Plant, Germiston',deliverTo:'Hamburg Industrie Park',docs:9,photos:10}),\n      mk({id:'e',fileRef:'TT-2026-0339',commodity:'effects',title:'Household removal — Naidoo family',pol:'Cape Town',pod:'Sydney',vessel:'MV Cap San Nicolas',etd:'10 Nov 2025',eta:'19 Dec 2025',status:'Delivered',progress:100,\n        client:'Naidoo Family',agent:'Cape Reading Agency',container:'TLLU 552 7781',seal:'AU-559210',bl:'CRA250112388',pol2:'CAPE TOWN',pod2:'SYDNEY',contType:\"1 × 20' Container\",\n        collFrom:'Constantia, Cape Town',deliverTo:'Bondi, Sydney',docs:8,photos:14}),\n      mk({id:'f',fileRef:'TT-2026-0420',commodity:'reefer',title:'Reefer — bottled wine · 1×40′',pol:'Cape Town',pod:'London Gateway',vessel:'MV Santa Ursula',etd:'30 Jun 2026',eta:'02 Aug 2026',status:'Booked',progress:12,\n        client:'Stellar Wines',agent:'Harbour Point Forwarding',container:'SUDU 770 2299',seal:'pending',bl:'pending',pol2:'CAPE TOWN',pod2:'LONDON GATEWAY',contType:\"1 × 40' Reefer\",\n        collFrom:'Stellenbosch Cellars',deliverTo:'Tilbury Bonded Wh.',docs:3,photos:2})\n    ];\n    return this._d;\n  }\n\n  visible(){\n    const r=this.state.role;\n    let list=this.data();\n    if(r==='client') list=list.filter(s=>s.client==='Acme Imports');\n    else if(r==='agent') list=list.filter(s=>s.agent==='Cape Reading Agency');\n    if(this.state.commodity!=='all') list=list.filter(s=>s.commodity===this.state.commodity);\n    const q=this.state.search.trim().toLowerCase();\n    if(q) list=list.filter(s=>(s.fileRef+' '+s.title+' '+s.vessel+' '+s.container+' '+s.pol+' '+s.pod).toLowerCase().includes(q));\n    return list;\n  }\n\n  selected(){ return this.data().find(s=>s.id===this.state.selId); }\n\n  buildTrack(s){\n    const stages=[\n      {label:'Booked',date:'Confirmed'},\n      {label:'Collected',date:'Origin'},\n      {label:'Origin port',date:'Loaded'},\n      {label:'On vessel',date:s.etd},\n      {label:'Arrived',date:s.eta},\n      {label:'Delivered',date:'Final'}\n    ];\n    const order=['Booked','Collected','At origin port','On vessel','In transit','Arrived','Cleared','Delivered'];\n    // map current status to a track index\n    const idxMap={'Booked':0,'Collected':1,'At origin port':2,'On vessel':3,'In transit':3,'Arrived':4,'Cleared':4,'Delivered':5};\n    const cur=idxMap[s.status]??3;\n    const accent=this.statusInfo(s.status);\n    return stages.map((st,i)=>{\n      const done=i<cur, here=i===cur;\n      return {\n        label:st.label,date:st.date,\n        mark: done?'✓':(here?'●':''),\n        dotBg: done?accent:(here?accent:'#E4EAED'),\n        dotBorder: done||here?accent:'#E4EAED',\n        textColor: done||here?'#0F1A1F':'#9AA8AE',\n        lineColor: i<=cur?accent:'#E4EAED',\n        lineDisplay: i===0?'none':'block'\n      };\n    });\n  }\n\n  docsFor(s){\n    const t=(name,ext,cat,size,mod)=>({name,ext,size,category:cat,modified:mod,\n      iconBg: ext==='PDF'?'#FDECEC':(ext==='ZIP'?'#EAF3FD':'#EAF8F0'),\n      iconColor: ext==='PDF'?'#D14343':(ext==='ZIP'?'#1391B8':'#2BA66A'),\n      catBg:{ 'Bill of Lading':'#EEE8FB','Invoice':'#FDF0E3','Customs':'#E6F5EC','Check sheet':'#E7F4FA','Packing':'#F0F3F5'}[cat]||'#F0F3F5',\n      catColor:{ 'Bill of Lading':'#6B4FC7','Invoice':'#C2772A','Customs':'#2BA66A','Check sheet':'#1391B8','Packing':'#5A6B72'}[cat]||'#5A6B72'\n    });\n    const base=[\n      t(s.fileRef+'_Bill_of_Lading.pdf','PDF','Bill of Lading','184 KB','9 Jun 2026'),\n      t(s.fileRef+'_Commercial_Invoice.pdf','PDF','Invoice','96 KB','8 Jun 2026'),\n      t(s.fileRef+'_Packing_List.pdf','PDF','Packing','120 KB','8 Jun 2026'),\n      t(s.fileRef+'_Customs_Clearance.pdf','PDF','Customs','210 KB','10 Jun 2026'),\n      t(s.fileRef+'_Origin_Photos.zip','ZIP','Packing','33 MB','9 Jun 2026')\n    ];\n    if(s.commodity==='vehicle'){\n      base.splice(3,0,t(s.fileRef+'_Condition_Check_Sheet.pdf','PDF','Check sheet','188 KB','10 Jun 2026'));\n    }\n    return base.slice(0, s.docs);\n  }\n\n  photoGroupsFor(s){\n    const grp=(stage,date,dot,n,prefix)=>({stage,date,dot,count:n,\n      photos:Array.from({length:n}).map((_,i)=>({\n        caption:prefix+' '+(i+1),code:s.fileRef+'_'+prefix.replace(/\\s/g,'').toUpperCase()+'_'+(i+1),\n        bg:this.tile(s.fileRef.charCodeAt(8)+i+stage.length),\n        meta:s.title+' · '+stage\n      }))\n    });\n    const groups=[\n      grp('Loading & packing',s.etd,'#E08A3C',Math.min(4,s.photos),'Loading'),\n    ];\n    if(s.photos>4) groups.push(grp('At origin port','Pre-shipment','#D6A21E',Math.min(4,s.photos-4),'Port'));\n    if(s.photos>8) groups.push(grp('On arrival / delivery',s.eta,'#2BA66A',s.photos-8,'Delivery'));\n    return groups;\n  }\n\n  historyFor(s){\n    const e=(date,time,event,detail,dot)=>({date,time,event,detail,dot});\n    const accent=this.statusInfo(s.status);\n    return [\n      e('10 Jun 2026','09:52',s.status+' — current status',s.title+' is currently '+s.status.toLowerCase()+'.',accent),\n      e('09 Jun 2026','08:01','Documents uploaded','Bill of Lading and origin photos added to the platform.','#1391B8'),\n      e(s.etd,'06:30','Loaded & sailed','Departed '+s.pol+' aboard '+s.vessel+'.','#1FA9D1'),\n      e('Origin','—','Collected from shipper','Collected from '+s.collFrom+'.','#E08A3C'),\n      e('Booking','—','Shipment booked','File '+s.fileRef+' opened for '+s.client+'.','#8A6FE0')\n    ];\n  }\n\n  renderVals(){\n    const st=this.state;\n    const accent='#1FA9D1';\n    const roleMeta={client:{name:'Acme Imports',label:'Client',initials:'AI'},agent:{name:'Cape Reading Agency',label:'Partner Agent',initials:'CR'},admin:{name:'Titan Tides Ops',label:'Admin / Staff',initials:'TT'}};\n\n    // ----- login roles -----\n    const roleDefs=[\n      {key:'client',label:'Client',sub:'My shipments'},\n      {key:'agent',label:'Agent',sub:'Partner files'},\n      {key:'admin',label:'Admin',sub:'Everything'}\n    ];\n    const roles=roleDefs.map(r=>{\n      const active=st.role===r.key;\n      return {label:r.label,sub:r.sub,\n        btnStyle:`padding:12px 8px;border-radius:11px;cursor:pointer;text-align:center;border:1.5px solid ${active?'#0F1A1F':'#DCE3E6'};background:${active?'#0F1A1F':'#fff'};color:${active?'#fff':'#33454C'}`,\n        pick:()=>this.setState({role:r.key})};\n    });\n\n    const role=st.role||'client';\n    const user=roleMeta[role]?{...roleMeta[role],roleLabel:roleMeta[role].label}:roleMeta.client;\n    const canUpload = role==='admin';\n\n    // ----- list -----\n    const vis=this.visible();\n    const allForRole=(()=>{const r=st.role; let l=this.data(); if(r==='client')l=l.filter(s=>s.client==='Acme Imports'); else if(r==='agent')l=l.filter(s=>s.agent==='Cape Reading Agency'); return l;})();\n    const visibleShipments=vis.map(s=>({\n      ...s,\n      icon:this.icon(s.commodity),commodityLabel:this.cLabel(s.commodity),\n      accent:this.statusInfo(s.status),\n      heroBg:this.hero(s.commodity),\n      progress:s.progress+'%',\n      docCount:this.docsFor(s).length,photoCount:s.photos,\n      open:()=>this.setState({view:'detail',selId:s.id,tab:'overview'})\n    }));\n\n    const inTransit=allForRole.filter(s=>['On vessel','In transit'].includes(s.status)).length;\n    const arrived=allForRole.filter(s=>['Arrived','Cleared','Delivered'].includes(s.status)).length;\n    const totalDocs=allForRole.reduce((a,s)=>a+this.docsFor(s).length,0);\n    const totalPhotos=allForRole.reduce((a,s)=>a+s.photos,0);\n    const stats=[\n      {label:'Active shipments',value:String(allForRole.length),note:inTransit+' in transit',tint:'#1391B8'},\n      {label:'Arrived / delivered',value:String(arrived),note:'this period',tint:'#2BA66A'},\n      {label:'Documents',value:String(totalDocs),note:'all on platform',tint:'#6A7B82'},\n      {label:'Photos',value:String(totalPhotos),note:'no Google links',tint:'#1FA9D1'}\n    ];\n\n    const chipDefs=[['all','All'],['vehicle','🚗 Vehicles'],['general','📦 General'],['machinery','⚙️ Machinery'],['effects','🏠 Effects'],['reefer','❄️ Reefer']];\n    const commodityChips=chipDefs.map(([k,l])=>{\n      const active=st.commodity===k;\n      return {label:l,style:`padding:8px 15px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid ${active?'#0F1A1F':'#DCE3E6'};background:${active?'#0F1A1F':'#fff'};color:${active?'#fff':'#41535A'}`,\n        pick:()=>this.setState({commodity:k})};\n    });\n\n    const listSubtitle={client:'Your shipments with Titan Tides Logistics.',agent:'Shipments handled by your agency.',admin:'All shipments across every client and agent.'}[role];\n\n    // ----- detail -----\n    const s=this.selected();\n    let sel=null,tabs=[],lightbox=null;\n    if(s){\n      const docs=this.docsFor(s);\n      const isVeh=s.commodity==='vehicle';\n      const openPhoto=(p)=>()=>this.setState({lightbox:p});\n      const upPhotos=(st.uploads[s.id]||[]);\n      let photoGroups=this.photoGroupsFor(s).map(g=>({...g,photos:g.photos.map(p=>({...p,open:openPhoto(p)}))}));\n      if(upPhotos.length){\n        const byStage={};\n        upPhotos.forEach((u,i)=>{ (byStage[u.stage]=byStage[u.stage]||[]).push({...u,i}); });\n        Object.keys(byStage).forEach(stage=>{\n          const arr=byStage[stage];\n          photoGroups.push({stage:stage+' · uploaded by Titan Tides',date:'Just now',dot:'#1FA9D1',count:arr.length,\n            photos:arr.map(u=>{const p={caption:'Photo '+(u.i+1),code:s.fileRef+'_TT_UPLOAD_'+(u.i+1),bg:'background-image:url('+u.url+');background-size:cover;background-position:center',meta:s.title+' · '+stage,_raw:u.url};return {...p,open:openPhoto(p)};})});\n        });\n      }\n      const totalPhotos=s.photos+upPhotos.length;\n      const daysNote = s.status==='Delivered'?'completed':(s.progress>=88?'arriving soon':'on schedule');\n\n      const infoCards=[\n        {title:'Shipping information',rows:[\n          {k:'Container No.',v:s.container},{k:'Seal No.',v:s.seal},{k:'Bill of Lading',v:s.bl},\n          {k:'Vessel',v:s.vessel},{k:'ETD',v:s.etd},{k:'ETA',v:s.eta},{k:'Type',v:s.contType}\n        ]},\n        {title:'Route & ports',rows:[\n          {k:'Port of loading',v:s.pol2},{k:'Port of discharge',v:s.pod2},\n          {k:'Collection from',v:s.collFrom},{k:'Deliver to',v:s.deliverTo}\n        ]},\n map(([k,l,badge])=>{\n        const active=st.tab===k;\n        return {label:l,badge,\n          badgeBg:active?'#1FA9D1':'#E4EAED',badgeColor:active?'#fff':'#5A6B72',\n          style:`background:${active?'#fff':'transparent'};border:1px solid ${active?'#E4EAED':'transparent'};border-bottom:${active?'1px solid #fff':'1px solid transparent'};border-radius:11px 11px 0 0;padding:11px 18px;font-weight:700;font-size:13.5px;cursor:pointer;color:${active?'#0F1A1F':'#41535A'};font-family:'Archivo';position:relative;top:1px`,\n          pick:()=>this.setState({tab:k})};\n      });\n\n      lightbox=st.lightbox;\n    }\n\n    return {\n      isLogin:st.screen==='login',isApp:st.screen==='app',\n      isList:st.view==='list',isDetail:st.view==='detail',\n      roles,loginUser:'titantides',signIn:()=>this.setState({screen:'app',role:st.role||'client',view:'list'}),\n      user,canUpload,\n      search:st.search,onSearch:(e)=>this.setState({search:e.target.value}),\n      goList:()=>this.setState({view:'list',selId:null,search:'',lightbox:null}),\n      logout:()=>this.setState({screen:'login',role:null,view:'list',selId:null,search:'',commodity:'all'}),\n      stats,commodityChips,listSubtitle,visibleShipments,\n      sel,tabs,\n      tabOverview:st.tab==='overview',tabDocs:st.tab==='documents',tabPhotos:st.tab==='photos',tabVehicle:st.tab==='vehicle',tabHistory:st.tab==='history',\n      openVehicleTab:()=>this.setState({tab:'vehicle'}),\n      lightboxOpen:!!st.lightbox,lightbox:st.lightbox||{bg:'',code:'',caption:'',meta:''},\n      closeLightbox:()=>this.setState({lightbox:null}),\n\n      // ----- upload -----\n      uploadOpen:st.uploadOpen,\n      openUpload:()=>this.setState({uploadOpen:true,draft:[],draftStage:'On arrival / delivery',dragOver:false}),\n      closeUpload:()=>this.setState({uploadOpen:false,draft:[],dragOver:false}),\n      stop:(e)=>e.stopPropagation(),\n      stageOptions:['Loading & packing','At origin port','On arrival / delivery'].map(label=>{\n        const active=st.draftStage===label;\n        return {label,style:`padding:7px 13px;border-radius:18px;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid ${active?'#0F1A1F':'#DCE3E6'};background:${active?'#0F1A1F':'#fff'};color:${active?'#fff':'#41535A'}`,\n          pick:()=>this.setState({draftStage:label})};\n      }),\n      onFiles:(e)=>{ this.readFiles(e.target.files); e.target.value=''; },\n      onDragOver:(e)=>{ e.preventDefault(); if(!st.dragOver) this.setState({dragOver:true}); },\n      onDrop:(e)=>{ e.preventDefault(); this.setState({dragOver:false}); this.readFiles(e.dataTransfer.files); },\n      dropBorder: st.dragOver?'#1FA9D1':'#CBD6DB',\n      dropBg: st.dragOver?'#F0FAFD':'#F8FAFB',\n      hasDraft: st.draft.length>0,\n      draftLabel: st.draft.length+' photo'+(st.draft.length===1?'':'s')+' ready',\n      draftPhotos: st.draft.map((d,i)=>({style:'background-image:url('+d.url+')',\n        remove:()=>this.setState(s2=>({draft:s2.draft.filter((_,j)=>j!==i)}))})),\n      saveLabel: st.draft.length? 'Add '+st.draft.length+' photo'+(st.draft.length===1?'':'s') : 'Add photos',\n      saveBg: st.draft.length? '#0F1A1F':'#AEBBC1',\n      saveCursor: st.draft.length? 'pointer':'not-allowed',\n      saveUpload:()=>{\n        if(!st.draft.length || !s) return;\n        const arr=(st.uploads[s.id]||[]).concat(st.draft.map(d=>({url:d.url,stage:st.draftStage,caption:d.name})));\n        const uploads={...st.uploads,[s.id]:arr};\n        this.persist(uploads);\n        this.setState({uploads,uploadOpen:false,draft:[]});\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
