      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');

    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];
      try {

        if (entry.compressed) {

            const reader = ds.readable.getReader();

            writer.close();

            while (true) {
              const { done, value } = await reader.read();

              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"4064ebe0-9149-46ec-8f28-fd80e193a5ba\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"f3527708-7e45-41c9-9eb2-a30af7b04845\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;margin:0;padding:0}\n  body{font-family:'IBM Plex Sans',system-ui,sans-serif;color:#0F1A1F;background:#EEF2F4;-webkit-font-smoothing:antialiased}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:#c4ced3;border-radius:8px;border:2px solid #EEF2F4}\n  ::placeholder{color:#9AA8AE}\n  input,button,select{font-family:inherit}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh\">\n\n  <!-- ================= LOGIN ================= -->\n  <sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"min-height:100vh;display:grid;grid-template-columns:1.05fr 0.95fr\">\n    <!-- brand panel -->\n    <div style=\"position:relative;background:linear-gradient(160deg,#0B161B 0%,#10242C 55%,#0B3845 100%);overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;padding:52px 56px;color:#fff\">\n      <div style=\"position:absolute;right:-120px;top:40px;width:620px;height:620px;opacity:.13;background:url(&quot;58d45895-6bb6-47c0-ba94-e498b2870633&quot;) center/contain no-repeat;pointer-events:none\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;position:relative\">\n        <img src=\"58d45895-6bb6-47c0-ba94-e498b2870633\" style=\"height:46px;width:auto\" alt=\"Titan Tides\">\n        <div style=\"line-height:1\">\n          <div style=\"font-family:'Archivo';font-weight:800;letter-spacing:.14em;font-size:18px\">TITAN TIDES<\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:600;letter-spacing:.42em;font-size:10px;color:#5CC6E6;margin-top:3px\">LOGISTICS<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;max-width:460px\">\n        <div style=\"font-family:'Archivo';font-weight:800;font-size:46px;line-height:1.05;letter-spacing:-0.01em\">One platform for every shipment.<\u002Fdiv>\n        <p style=\"margin-top:22px;font-size:16px;line-height:1.6;color:#A9BFC8;max-width:400px\">Everything relating to your shipment is securely organised in one place \u2014 documents, photos, updates and complete shipment history \u2014 without the endless email attachments and Google links.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:relative;font-family:'Archivo';font-weight:600;font-size:13px;letter-spacing:.08em;color:#5CC6E6\">HARNESSING STRENGTH, NAVIGATING CHANGE<\u002Fdiv>\n    <\u002Fdiv>\n    <!-- form panel -->\n    <div style=\"display:flex;align-items:center;justify-content:center;padding:40px;background:#fff\">\n      <div style=\"width:100%;max-width:380px\">\n        <div style=\"font-family:'Archivo';font-weight:800;font-size:26px\">Sign in<\u002Fdiv>\n        <p style=\"color:#5A6B72;margin-top:8px;font-size:14px\">Access your shipments, documents and photos.<\u002Fp>\n\n        <div style=\"margin-top:28px;font-size:12px;font-weight:600;letter-spacing:.06em;color:#5A6B72;text-transform:uppercase\">I'm signing in as<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px\">\n          <sc-for list=\"{{ roles }}\" as=\"r\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ r.pick }}\" style=\"{{ r.btnStyle }}\">\n              <div style=\"font-weight:700;font-size:13px\">{{ r.label }}<\u002Fdiv>\n              <div style=\"font-size:10px;margin-top:3px;opacity:.7\">{{ r.sub }}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:22px\">\n          <label style=\"font-size:12px;font-weight:600;color:#3A4A50\">Username<\u002Flabel>\n          <input value=\"{{ loginUser }}\" placeholder=\"username\" style=\"width:100%;margin-top:6px;padding:12px 14px;border:1.5px solid #D6DEE2;border-radius:10px;font-size:14px;outline:none\">\n        <\u002Fdiv>\n        <div style=\"margin-top:14px\">\n          <label style=\"font-size:12px;font-weight:600;color:#3A4A50\">Password<\u002Flabel>\n          <input type=\"password\" value=\"{{ loginPassword }}\" onchange=\"{{ onPassword }}\" onkeydown=\"{{ onLoginKey }}\" placeholder=\"Enter password\" style=\"width:100%;margin-top:6px;padding:12px 14px;border:1.5px solid {{ pwBorder }};border-radius:10px;font-size:14px;outline:none\">\n        <\u002Fdiv>\n        <sc-if value=\"{{ loginError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:11px;background:#FDECEC;border:1px solid #F6C9C9;color:#C0392B;border-radius:9px;padding:9px 12px;font-size:12.5px;font-weight:600\">{{ loginError }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <button onclick=\"{{ signIn }}\" style=\"width:100%;margin-top:18px;padding:13px;border:none;border-radius:10px;background:#0F1A1F;color:#fff;font-weight:700;font-size:15px;cursor:pointer;font-family:'Archivo'\">Sign in to portal<\u002Fbutton>\n        <div style=\"display:flex;justify-content:space-between;margin-top:16px;font-size:12.5px;color:#5A6B72\">\n          <label style=\"display:flex;align-items:center;gap:7px;cursor:pointer\"><input type=\"checkbox\" checked=\"\"> Remember me<\u002Flabel>\n          <a style=\"color:#1391B8;text-decoration:none;cursor:pointer\">Forgotten password?<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"margin-top:26px;padding:11px 13px;background:#F0FAFD;border:1px solid #CDEEF7;border-radius:9px;font-size:11.5px;color:#3A6470;line-height:1.5\">Demo \u2014 pick a role above, enter password <b>12345<\u002Fb> and press <b>Sign in<\u002Fb>. Each role sees a different set of shipments.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= APP ================= -->\n  <sc-if value=\"{{ isApp }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <!-- top bar -->\n    <div style=\"position:sticky;top:0;z-index:30;background:#0F1A1F;color:#fff;display:flex;align-items:center;gap:20px;padding:0 26px;height:62px\">\n      <div onclick=\"{{ goList }}\" style=\"display:flex;align-items:center;gap:11px;cursor:pointer\">\n        <img src=\"58d45895-6bb6-47c0-ba94-e498b2870633\" style=\"height:30px\" alt=\"\">\n        <div style=\"line-height:1\"><span style=\"font-family:'Archivo';font-weight:800;letter-spacing:.12em;font-size:15px\">TITAN TIDES<\u002Fspan><span style=\"font-family:'Archivo';font-weight:600;letter-spacing:.3em;font-size:8px;color:#5CC6E6;display:block;margin-top:2px\">LOGISTICS PORTAL<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <div style=\"display:flex;gap:6px;margin-right:8px\">\n        <button onclick=\"{{ goList }}\" style=\"{{ navShipStyle }}\">Shipments<\u002Fbutton>\n        <button onclick=\"{{ goTrack }}\" style=\"{{ navTrackStyle }}\">\u2693 Track a shipment<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"position:relative;width:250px;max-width:28vw\">\n        <input value=\"{{ search }}\" onchange=\"{{ onSearch }}\" placeholder=\"Search file ref, container, vessel\u2026\" style=\"width:100%;padding:9px 14px 9px 38px;border-radius:9px;border:1px solid #2A3A41;background:#16262D;color:#fff;font-size:13px;outline:none\">\n        <span style=\"position:absolute;left:13px;top:9px;color:#5A7178\">\u2315<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;padding-left:8px;border-left:1px solid #25353C;margin-left:4px\">\n        <div style=\"width:34px;height:34px;border-radius:50%;background:#1FA9D1;color:#04222B;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;font-family:'Archivo'\">{{ user.initials }}<\u002Fdiv>\n        <div style=\"line-height:1.2\">\n          <div style=\"font-size:13px;font-weight:600\">{{ user.name }}<\u002Fdiv>\n          <div style=\"font-size:10.5px;color:#7F949B\">{{ user.roleLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ logout }}\" title=\"Sign out\" style=\"margin-left:6px;background:none;border:1px solid #2A3A41;color:#9FB4BB;border-radius:8px;padding:7px 11px;font-size:12px;cursor:pointer\">Logout<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===== LIST VIEW ===== -->\n    <sc-if value=\"{{ isList }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:28px 26px 60px\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px\">\n        <div>\n          <div style=\"font-family:'Archivo';font-weight:800;font-size:27px;letter-spacing:-0.01em\">Shipments<\u002Fdiv>\n          <p style=\"color:#5A6B72;margin-top:5px;font-size:14px\">{{ listSubtitle }}<\u002Fp>\n        <\u002Fdiv>\n        <sc-if value=\"{{ canCreate }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ openNew }}\" style=\"background:#0F1A1F;color:#fff;border:none;border-radius:10px;padding:11px 18px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:'Archivo'\">+ New shipment<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- stat cards -->\n      <div style=\"margin-top:22px\">\n        <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:14px\">\n          <sc-for list=\"{{ stats }}\" as=\"st\" hint-placeholder-count=\"2\">\n            <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:14px;padding:16px 18px\">\n              <div style=\"font-size:12px;color:#6A7B82;font-weight:600\">{{ st.label }}<\u002Fdiv>\n              <div style=\"font-family:'Archivo';font-weight:800;font-size:30px;margin-top:6px;line-height:1\">{{ st.value }}<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:{{ st.tint }};margin-top:6px;font-weight:600\">{{ st.note }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px\">\n            <button onclick=\"{{ onShowFin }}\" style=\"background:{{ showFinPanel ? '#0F1A1F' : '#fff' }};border:1px solid {{ showFinPanel ? '#0F1A1F' : '#E4EAED' }};border-radius:14px;padding:16px 18px;cursor:pointer;text-align:left;width:100%\"><div style=\"font-size:22px;margin-bottom:8px\">&#128200;<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:{{ showFinPanel ? '#fff' : '#0F1A1F' }};margin-bottom:3px\">Financial Summary<\u002Fdiv><div style=\"font-size:11.5px;color:#1391B8;font-weight:600\">P&amp;L across all shipments<\u002Fdiv><\u002Fbutton>\n            <button onclick=\"{{ onShowOvw }}\" style=\"background:{{ showOvwPanel ? '#0F1A1F' : '#fff' }};border:1px solid {{ showOvwPanel ? '#0F1A1F' : '#E4EAED' }};border-radius:14px;padding:16px 18px;cursor:pointer;text-align:left;width:100%\"><div style=\"font-size:22px;margin-bottom:8px\">&#128197;<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:{{ showOvwPanel ? '#fff' : '#0F1A1F' }};margin-bottom:3px\">Shipment Overview<\u002Fdiv><div style=\"font-size:11.5px;color:#1391B8;font-weight:600\">Monthly bar chart by year<\u002Fdiv><\u002Fbutton>\n            <button onclick=\"{{ onShowRpt }}\" style=\"background:{{ showRptPanel ? '#0F1A1F' : '#fff' }};border:1px solid {{ showRptPanel ? '#0F1A1F' : '#E4EAED' }};border-radius:14px;padding:16px 18px;cursor:pointer;text-align:left;width:100%\"><div style=\"font-size:22px;margin-bottom:8px\">&#128196;<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:{{ showRptPanel ? '#fff' : '#0F1A1F' }};margin-bottom:3px\">Generate Reports<\u002Fdiv><div style=\"font-size:11.5px;color:#1391B8;font-weight:600\">Portfolio report &amp; print<\u002Fdiv><\u002Fbutton>\n          <\u002Fdiv>\n        <sc-if value=\"{{ showFinPanel }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;overflow:hidden;margin-top:14px\">\n            <div style=\"padding:14px 18px;border-bottom:1px solid #E4EAED;display:flex;justify-content:space-between;align-items:center\">\n              <div style=\"font-weight:700;font-size:16px;color:#0F1A1F\">Financial Summary<\u002Fdiv>\n              <div style=\"font-size:11px;color:#74858B\">Portfolio P&amp;L<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:14px 18px\">\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px\">\n                <div style=\"background:#F7F9FA;border-radius:10px;padding:12px 14px\"><div style=\"font-size:10px;font-weight:700;text-transform:uppercase;color:#74858B;margin-bottom:3px\">Revenue<\u002Fdiv><div style=\"font-size:18px;font-weight:800;color:#0F1A1F\">R 485 000<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#F7F9FA;border-radius:10px;padding:12px 14px\"><div style=\"font-size:10px;font-weight:700;text-transform:uppercase;color:#74858B;margin-bottom:3px\">Costs<\u002Fdiv><div style=\"font-size:18px;font-weight:800;color:#D14343\">R 420 000<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#2BA66A;border-radius:10px;padding:12px 14px\"><div style=\"font-size:10px;font-weight:700;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:3px\">Profit<\u002Fdiv><div style=\"font-size:18px;font-weight:800;color:#fff\">R 65 000<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12px;color:#74858B;margin-bottom:8px\">Per-shipment data \u2014 scroll below shipment list for full table<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:90px 1fr 70px;gap:8px;padding:8px 0;border-bottom:1px solid #E4EAED;font-size:10px;font-weight:700;text-transform:uppercase;color:#74858B\"><div>Ref<\u002Fdiv><div>Shipment<\u002Fdiv><div>Profit<\u002Fdiv><\u002Fdiv>\n              <sc-for list=\"{{ allShipFin.rows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                <div style=\"display:grid;grid-template-columns:90px 1fr 70px;gap:8px;padding:9px 0;border-bottom:1px solid #F5F7F8;font-size:12px;align-items:center\">\n                  <div style=\"font-weight:600;color:#1391B8;font-size:11px\">{{ r.fileRef }}<\u002Fdiv>\n                  <div style=\"color:#33454C\">{{ r.title }}<\u002Fdiv>\n                  <div style=\"font-weight:700;color:#2BA66A\">{{ r.profitFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showOvwPanel }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;overflow:hidden;margin-top:14px\">\n            <div style=\"padding:14px 18px;border-bottom:1px solid #E4EAED;display:flex;justify-content:space-between;align-items:center\">\n              <div style=\"font-weight:700;font-size:16px;color:#0F1A1F\">Shipment Overview<\u002Fdiv>\n              <div style=\"display:flex;gap:6px\">\n                <sc-for list=\"{{ overview.yrs }}\" as=\"yr\" hint-placeholder-count=\"2\">\n                  <button onclick=\"{{ onOvYear(yr) }}\" style=\"padding:5px 12px;border-radius:16px;border:1.5px solid #E4EAED;font-size:11px;font-weight:700;background:#fff;cursor:pointer;color:#74858B\">{{ yr }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:14px 18px\">\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px\">\n                <div style=\"background:#F7F9FA;border-radius:10px;padding:12px 14px\"><div style=\"font-size:10px;font-weight:700;text-transform:uppercase;color:#74858B;margin-bottom:3px\">Total<\u002Fdiv><div style=\"font-size:18px;font-weight:800;color:#0F1A1F\">{{ overview.total }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#F7F9FA;border-radius:10px;padding:12px 14px\"><div style=\"font-size:10px;font-weight:700;text-transform:uppercase;color:#74858B;margin-bottom:3px\">Active<\u002Fdiv><div style=\"font-size:18px;font-weight:800;color:#1391B8\">{{ overview.active }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#F7F9FA;border-radius:10px;padding:12px 14px\"><div style=\"font-size:10px;font-weight:700;text-transform:uppercase;color:#74858B;margin-bottom:3px\">Delivered<\u002Fdiv><div style=\"font-size:18px;font-weight:800;color:#2BA66A\">{{ overview.delivered }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ overview.byMonth }}\" as=\"om\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F5F7F8;font-size:13px\">\n                  <div style=\"font-weight:600;color:#0F1A1F;width:40px\">{{ om.month }}<\u002Fdiv>\n                  <div style=\"flex:1;margin:0 10px;background:#E4EAED;border-radius:4px;height:8px;overflow:hidden\">\n                    <div style=\"height:8px;background:#1FA9D1;border-radius:4px;width:{{ om.count > 0 ? Math.round(om.count/overview.total*100) + '%' : '0%' }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"color:#74858B;font-size:12px\">{{ om.count }} shipment{{ om.count !== 1 ? 's' : '' }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showRptPanel }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;overflow:hidden;margin-top:14px\">\n            <div style=\"padding:14px 18px;border-bottom:1px solid #E4EAED;font-weight:700;font-size:16px;color:#0F1A1F\">Generate Reports<\u002Fdiv>\n            <div style=\"padding:14px 18px\">\n              <div style=\"font-size:13px;color:#74858B;margin-bottom:14px\">Generates a formatted portfolio summary from your live shipment data. No internet required.<\u002Fdiv>\n              <div style=\"display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap\">\n                <button onclick=\"{{ onGenerateAi }}\" style=\"padding:10px 22px;background:#1FA9D1;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer\">Generate Report<\u002Fbutton>\n                <button onclick=\"{{ onPrintReport }}\" style=\"padding:10px 18px;background:#fff;color:#0F1A1F;border:1.5px solid #D6DEE2;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer\">Print / Save PDF<\u002Fbutton>\n              <\u002Fdiv>\n              <sc-if value=\"{{ aiReport }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"background:#F7F9FA;border-radius:10px;padding:14px;font-family:monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;max-height:280px;overflow-y:auto;color:#0F1A1F\">{{ aiReport }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- filter chips -->\n      <div style=\"display:flex;gap:8px;margin-top:26px;flex-wrap:wrap\">\n        <sc-for list=\"{{ commodityChips }}\" as=\"c\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ c.pick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- shipment cards -->\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;margin-top:18px\">\n        <sc-for list=\"{{ visibleShipments }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ s.open }}\" style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s;display:flex;flex-direction:column\" style-hover=\"box-shadow:0 10px 30px rgba(15,26,31,.10);transform:translateY(-2px)\">\n            <div style=\"height:118px;position:relative;{{ s.heroBg }}\">\n              <div style=\"position:absolute;left:14px;top:12px;display:flex;gap:7px;align-items:center\">\n                <span style=\"background:rgba(255,255,255,.92);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px\">{{ s.icon }} {{ s.commodityLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"position:absolute;right:14px;top:12px;background:{{ s.accent }};color:#fff;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700\">{{ s.status }}<\u002Fdiv>\n              <div style=\"position:absolute;left:14px;bottom:11px;color:#fff;font-family:'IBM Plex Mono';font-size:12px;font-weight:500;background:rgba(8,20,24,.55);padding:3px 8px;border-radius:6px\">{{ s.fileRef }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:15px 17px 17px;flex:1;display:flex;flex-direction:column\">\n              <div style=\"font-family:'Archivo';font-weight:700;font-size:16.5px;line-height:1.25\">{{ s.title }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:9px;margin-top:11px;font-size:13px;color:#41535A;font-weight:600\">\n                <span>{{ s.pol }}<\u002Fspan>\n                <span style=\"flex:1;height:1px;background:repeating-linear-gradient(90deg,#C2CED3 0 6px,transparent 6px 11px);position:relative\"><\u002Fspan>\n                <span style=\"color:#1391B8\">{{ s.pod }}<\u002Fspan>\n              <\u002Fdiv>\n              <!-- progress -->\n              <div style=\"margin-top:14px;height:6px;background:#EAEFF1;border-radius:5px;overflow:hidden\">\n                <div style=\"height:100%;width:{{ s.progress }};background:{{ s.accent }};border-radius:5px\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;margin-top:13px;padding-top:13px;border-top:1px solid #EEF2F4;font-size:12px\">\n                <div><div style=\"color:#8494 9A;color:#8A989E\">Vessel / ETA<\u002Fdiv><div style=\"font-weight:600;margin-top:2px\">{{ s.vessel }} \u00b7 {{ s.eta }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:right\"><div style=\"color:#8A989E\">Documents<\u002Fdiv><div style=\"font-weight:600;margin-top:2px\">{{ s.docCount }} files \u00b7 {{ s.photoCount }} photos<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== DETAIL VIEW ===== -->\n    <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n    <div>\n      <!-- detail hero -->\n      <div style=\"{{ sel.heroBg }};border-bottom:1px solid #E4EAED\">\n        <div style=\"max-width:1180px;margin:0 auto;padding:18px 26px 0\">\n          <button onclick=\"{{ goList }}\" style=\"background:rgba(255,255,255,.9);border:none;border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;color:#33454C\">\u2190 All shipments<\u002Fbutton>\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-end; =\"font-family:'Archivo';font-weight:700;font-size:16px\">{{ sel.vehicle.headline }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#9FC3D0;margin-top:3px\">VIN {{ sel.vehicle.chassis }} \u00b7 {{ sel.vehicle.colour }} \u00b7 {{ sel.vehicle.engine }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#1FA9D1;color:#04222B;border-radius:9px;padding:9px 15px;font-weight:700;font-size:13px;font-family:'Archivo'\">Open vehicle file \u2192<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- info grid -->\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px\">\n            <sc-for list=\"{{ sel.infoCards }}\" as=\"card\" hint-placeholder-count=\"3\">\n              <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;padding:20px 22px\">\n                <div style=\"font-family:'Archivo';font-weight:700;font-size:14px;color:#1391B8;margin-bottom:14px\">{{ card.title }}<\u002Fdiv>\n                <sc-for list=\"{{ card.rows }}\" as=\"row\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px dashed #EDF1F3;font-size:13px\">\n                    <span style=\"color:#74858B\">{{ row.k }}<\u002Fspan>\n                    <span style=\"font-weight:600;text-align:right\">{{ row.v }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- DOCUMENTS -->\n        <sc-if value=\"{{ tabDocs }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px\">\n            <div style=\"font-family:'Archivo';font-weight:700;font-size:18px\">Documents <span style=\"color:#9AA8AE;font-weig -weight:600\">{{ d.category }}<\u002Fspan><\u002Fdiv>\n                <div style=\"color:#74858B;font-size:12.5px\">{{ d.modified }}<\u002Fdiv>\n                <div style=\"text-align:right\"><a onclick=\"{{ d.download }}\" style=\"color:#1391B8;font-weight:600;text-decoration:none;cursor:pointer\">Download<\u002Fa><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- PHOTOS -->\n        <sc-if value=\"{{ tabPhotos }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:8px\">\n            <div style=\"font-family:'Archivo';font-weight:700;font-size:18px\">Photos <span style=\"color:#9AA8AE;font-weight:600\">({{ sel.photoCount }})<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:8px\">\n              <button style=\"background:#fff;border:1px solid #D6DEE2;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer\">Download all<\u002Fbutton>\n              <sc-if value=\"{{ canUpload }}\" hint-placeholder-val=\"{{ false }}\"><button onclick=\"{{ openUpload }}\" style=\"background:#0F1A1F;color:#fff;border:none;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Archivo'\">+ Add photos<\u002Fbutton><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"color:#5A6B72;font-size:13.5px;margin-bottom:20px\">All photos live here on the platform \u2014 no more chasing Google Drive links.<\u002Fp>\n          <sc-for list=\"{{ sel.photoGroups }}\" as=\"g\" hint-placeholder-count=\"3\">\n            <div style=\"margin-bottom:26px\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:12px\">\n                <span style=\"width:9px;height:9px;border-radius:50%;background:{{ g.dot }}\"><\u002Fspan>\n                <s VEHICLE PHOTO ]<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"padding:20px 22px\">\n                <div style=\"font-family:'Archivo';font-weight:800;font-size:22px\">{{ sel.vehicle.headline }}<\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:0 22px;margin-top:14px\">\n                  <sc-for list=\"{{ sel.vehicle.specs }}\" as=\"v\" hint-placeholder-count=\"6\">\n                    <div style=\"display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed #EDF1F3;font-size:13px\">\n                      <span style=\"color:#74858B\">{{ v.k }}<\u002Fspan><span style=\"font-weight:600\">{{ v.v }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;padding:20px 22px\">\n              <div style=\"font-family:'Archivo';font-weight:700;font-size:14px;color:#1391B8;margin-bottom:6px\">Condition check sheets<\u002Fdiv>\n              <p style=\"font-size:12.5px;color:#74858B;margin-bottom:14px\">Damage noted at each handover, with matching photos.<\u002Fp>\n              <sc-for list=\"{{ sel.vehicle.checks }}\" as=\"ch\" hint-placeholder-count=\"3\">\n                <div style=\"border:1px solid #EAEFF1;border-radius:12px;padding:13px 15px;margin-bottom:10px\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:center\">\n                    <div style=\"font-weight:700;font-size:13.5px\">{{ ch.location }}<\u002Fdiv>\n                    <span style=\"background:{{ ch.tagBg }};color:{{ ch.tagColor }};border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700\">{{ ch.tag }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size:12px;color:#74858B;margin-top:6px\">{{ ch.note }}<\u002Fdiv>\n                  <div style=\"display:flex;gap:6px;margin-top:10px\">\n                    <sc-for list=\"{{ ch.thumbs }}\" as=\"th\" hint-placeholder-count=\"3\">\n                      <div onclick=\"{{ th.open }}\" style=\"width:54px;height:42px;border-radius:7px;{{ th.bg }};cursor:pointer;border:1px solid #E4EAED\"><\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- HISTORY -->\n        <sc-if value=\"{{ tabHistory }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;margin-bottom:18px\">Shipment history<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;padding:8px 26px 8px\">\n            <sc-for list=\"{{ sel.history }}\" as=\"h\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;gap:18px;padding:16px 0;border-bottom:1px solid #F0F3F5\">\n                <div style=\"width:118px;flex-shrink:0;text-align:right;font-size:12px;color:#74858B;padding-top:2px\">{{ h.date }}<div style=\"font-size:11px;color:#A8B4B9\">{{ h.time }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"position:relative;display:flex;flex-direction:column;align-items:center\"><span style=\"width:12px;height:12px;border-radius:50%;background:{{ h.dot }};border:3px solid #fff;box-shadow:0 0 0 1.5px {{ h.dot }}\"><\u002Fspan><span style=\"flex:1;width:2px;background:#E4EAED;margin-top:3px\"><\u002Fspan><\u002Fdiv>\n                <div style=\"padding-bottom:4px\"><div style=\"font-weight:600;font-size:14px\">{{ h.event }}<\u002Fdiv><div style=\"font-size:12.5px;color:#74858B;margin-top:3px\">{{ h.detail }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <!-- NOTES TAB -->\n        <sc-if value=\"{{ tabNotes }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;margin-bottom:18px\">Notes &amp; Comments<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:24px\">\n            <sc-for list=\"{{ notesList_sel }}\" as=\"n\" hint-placeholder-count=\"2\">\n              <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:14px;padding:16px 20px\">\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:8px\">\n                  <div style=\"width:32px;height:32px;border-radius:50%;background:{{ n.roleBg }};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:{{ n.roleColor }}\">{{ n.initials }}<\u002Fdiv>\n                  <div><div style=\"font-weight:600;font-size:13.5px;color:#0F1A1F\">{{ n.author }}<\u002Fdiv><div style=\"font-size:11.5px;color:#A8B4B9;margin-top:1px\">{{ n.roleLabel }} \u00b7 {{ n.date }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:13.5px;color:#33454C;line-height:1.6;padding-left:42px\">{{ n.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:14px;padding:18px 20px\">\n            <div style=\"font-weight:600;font-size:13px;margin-bottom:10px;color:#3A4A50\">Add a note<\u002Fdiv>\n            <textarea value=\"{{ noteDraftSel }}\" onchange=\"{{ onNoteDraftSel }}\" placeholder=\"Type your note here...\" style=\"width:100%;min-height:80px;border:1.5px solid #D6DEE2;border-radius:10px;padding:10px 12px;font-size:13.5px;font-family:inherit;resize:vertical;outline:none;box-sizing:border-box\"><\u002Ftextarea>\n            <button onclick=\"{{ onAddNoteSel }}\" style=\"margin-top:10px;background:#0F1A1F;color:#fff;border:none;border-radius:9px;padding:9px 22px;font-size:13.5px;font-weight:600;cursor:pointer\">Post note<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- FINANCE TAB (admin only) -->\n        <sc-if value=\"{{ tabFinance }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;margin-bottom:6px\">Financial Summary<\u002Fdiv>\n          <div style=\"font-size:13px;color:#74858B;margin-bottom:20px\">P&amp;L overview for this shipment \u2014 visible to admin only<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px\">\n            <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;padding:20px\">\n              <div style=\"font-size:11px;font-weight:700;color:#74858B;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px\">Revenue<\u002Fdiv>\n              <div style=\"font-size:22px;font-weight:800;color:#0F1A1F\">R {{ finRevenueFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;padding:20px\">\n              <div style=\"font-size:11px;font-weight:700;color:#74858B;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px\">Total Costs<\u002Fdiv>\n              <div style=\"font-size:22px;font-weight:800;color:#D14343\">R {{ finTotalFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#2BA66A;border-radius:16px;padding:20px\">\n              <div style=\"font-size:11px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px\">Gross Profit ({{ finMarginPct }}%)<\u002Fdiv>\n              <div style=\"font-size:22px;font-weight:800;color:#fff\">R {{ finProfitFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;overflow:hidden;margin-bottom:20px\">\n              <div style=\"padding:14px 20px;border-bottom:1px solid #E4EAED;display:flex;justify-content:space-between;align-items:center\">\n                <div style=\"font-weight:700;font-size:13.5px;color:#0F1A1F\">Titan Tides Invoices to Client<\u002Fdiv>\n                <div style=\"font-size:12px;font-weight:700;color:#2BA66A\">R {{ finRevenueFmt }}<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ finInvoices }}\" as=\"i\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid #F5F7F8\">\n                  <div>\n                    <div style=\"font-weight:600;font-size:13px;color:#1391B8\">{{ i.inv }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:#74858B;margin-top:2px\">{{ i.label }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-weight:700;font-size:13.5px\">R {{ i.amountFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;overflow:hidden\">\n            <div style=\"padding:14px 20px;border-bottom:1px solid #E4EAED;font-weight:700;font-size:13.5px;color:#0F1A1F\">Cost Breakdown<\u002Fdiv>\n            <sc-for list=\"{{ finCosts }}\" as=\"c\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;padding:13px 20px;border-bottom:1px solid #F5F7F8\">\n                <div>\n                  <div style=\"font-weight:600;font-size:13.5px\">{{ c.label }}<\u002Fdiv>\n                  <div style=\"font-size:11.5px;color:#74858B;margin-top:2px\">{{ c.supplier }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-weight:700;font-size:14px\">R {{ c.amountFmt }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== TRACK VIEW ===== -->\n    <sc-if value=\"{{ isTrack }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:1000px;margin:0 auto;padding:28px 26px 70px\">\n      <button onclick=\"{{ goList }}\" style=\"background:#fff;border:1px solid #E4EAED;border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;color:#33454C\">\u2190 All shipments<\u002Fbutton>\n      <div style=\"margin-top:16px\">\n        <div style=\"font-family:'Archivo';font-weight:800;font-size:27px;letter-spacing:-0.01em\">Track a shipment<\u002Fdiv>\n        <p style=\"color:#5A6B72;margin-top:5px;font-size:14px\">Select a shipping line and enter a container or B/L number to open live vessel tracking on the carrier's official system.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;padding:24px;margin-top:20px\">\n        <div style=\"font-size:12px;font-weight:700;color:#3A4A50;text-transform:uppercase;letter-spacing:.05em;margin-bottom:11px\">1 \u00b7 Shipping line<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px\">\n          <sc-for list=\"{{ carrierOptions }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ c.pick }}\" style=\"{{ c.style }}\">\n              <span style=\"width:10px;height:10px;border-radius:50%;background:{{ c.color }};flex-shrink:0\"><\u002Fspan>\n              <span style=\"font-weight:700;font-size:13px\">{{ c.label }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"font-size:12px;font-weight:700;color:#3A4A50;text-transform:uppercase;letter-spacing:.05em;margin:22px 0 11px\">2 \u00b7 Container / B/L number<\u002Fdiv>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n          <input value=\"{{ trackContainer }}\" onchange=\"{{ onTrackContainer }}\" onkeydown=\"{{ onTrackKey }}\" placeholder=\"e.g. MSCU 884 1209\" style=\"flex:1;min-width:240px;padding:13px 15px;border:1.5px solid #D6DEE2;border-radius:11px;font-size:15px;font-family:'IBM Plex Mono';outline:none\">\n          <button onclick=\"{{ doTrack }}\" style=\"background:#0F1A1F;color:#fff;border:none;border-radius:11px;padding:0 24px;font-weight:700;font-size:14.5px;cursor:pointer;font-family:'Archivo';display:flex;align-items:center;gap:8px\">Track live \u2197<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"margin-top:13px;font-size:12px;color:#8A989E\">Opens {{ trackLineLabel }}'s tracking page in a new tab. Real-time position, vessel and milestone data come straight from the carrier.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;padding:24px;margin-top:16px\">\n        <div style=\"font-size:12px;font-weight:700;color:#3A4A50;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px\">Or follow the vessel \u2014 live map<\u002Fdiv>\n        <p style=\"font-size:13px;color:#5A6B72;margin-bottom:12px\">Enter a vessel name to see its real-time position at sea on MarineTraffic.<\u002Fp>\n        <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n          <input value=\"{{ trackVessel }}\" onchange=\"{{ onTrackVessel }}\" onkeydown=\"{{ onVesselKey }}\" placeholder=\"e.g. MSC Aliya\" style=\"flex:1;min-width:240px;padding:13px 15px;border:1.5px solid #D6DEE2;border-radius:11px;font-size:15px;outline:none\">\n          <button onclick=\"{{ doVesselTrack }}\" style=\"background:#1391B8;color:#fff;border:none;border-radius:11px;padding:0 24px;font-weight:700;font-size:14.5px;cursor:pointer;font-family:'Archivo';display:flex;align-items:center;gap:8px\">Live map \u2197<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:24px\">\n        <div style=\"font-family:'Archivo';font-weight:700;font-size:16px;margin-bottom:4px\">Your active shipments<\u002Fdiv>\n        <p style=\"color:#5A6B72;font-size:13px;margin-bottom:14px\">One-click tracking for shipments already on the platform.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px\">\n          <sc-for list=\"{{ quickTrack }}\" as=\"q\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:14px;padding:15px 17px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px\">\n                <div style=\"font-family:'Archivo';font-weight:700;font-size:14px\">{{ q.title }}<\u002Fdiv>\n                <span style=\"width:9px;height:9px;border-radius:50%;background:{{ q.color }};flex-shrink:0\"><\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:12px;color:#74858B;margin-top:5px\">{{ q.line }} \u00b7 <span style=\"font-family:'IBM Plex Mono'\">{{ q.container }}<\u002Fspan><\u002Fdiv>\n              <button onclick=\"{{ q.track }}\" style=\"margin-top:12px;width:100%;background:#F0FAFD;border:1px solid #CDEEF7;color:#0E6E8C;border-radius:9px;padding:9px;font-weight:700;font-size:12.5px;cursor:pointer\">Track live \u2197<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- UPLOAD MODAL -->\n    <sc-if value=\"{{ uploadOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ closeUpload }}\" style=\"position:fixed;inset:0;z-index:55;background:rgba(8,16,20,.6);display:flex;align-items:center;justify-content:center;padding:32px\">\n        <div onclick=\"{{ stop }}\" style=\"background:#fff;border-radius:18px;width:100%;max-width:560px;max-height:88vh;overflow:auto;box-shadow:0 24px 70px rgba(0,0,0,.3)\">\n          <div style=\"padding:22px 24px;border-bottom:1px solid #EEF2F4;display:flex;justify-content:space-between;align-items:center\">\n            <div>\n              <div style=\"font-family:'Archivo';font-weight:800;font-size:18px\">Add photos<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#74858B;margin-top:3px\">{{ sel.fileRef }} \u00b7 {{ sel.title }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ closeUpload }}\" style=\"background:#F0F3F5;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:15px;color:#5A6B72\">\u2715<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"padding:22px 24px\">\n            <div style=\"font-size:12px;font-weight:600;color:#3A4A50;margin-bottom:7px\">Shipment stage<\u002Fdiv>\n            <div style=\"display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px\">\n              <sc-for list=\"{{ stageOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ o.pick }}\" style=\"{{ o.style }}\">{{ o.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <label ondragover=\"{{ onDragOver }}\" ondrop=\"{{ onDrop }}\" style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:2px dashed {{ dropBorder }};border-radius:14px;padding:34px 20px;cursor:pointer;background:{{ dropBg }};text-align:center;transition:.15s\">\n              <div style=\"font-size:30px\">\ud83d\udcf7<\u002Fdiv>\n              <div style=\"font-weight:700;font-size:14.5px;font-family:'Archivo'\">Drag photos here or click to browse<\u002Fdiv>\n              <div style=\"font-size:12px;color:#8A989E\">JPG / PNG \u00b7 multiple files supported<\u002Fdiv>\n              <input type=\"file\" accept=\"image/*\" multiple=\"\" onchange=\"{{ onFiles }}\" style=\"display:none\">\n            <\u002Flabel>\n\n            <sc-if value=\"{{ hasDraft }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:18px\">\n                <div style=\"font-size:12px;font-weight:600;color:#3A4A50;margin-bottom:9px\">{{ draftLabel }}<\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:9px\">\n                  <sc-for list=\"{{ draftPhotos }}\" as=\"dp\" hint-placeholder-count=\"3\">\n                    <div style=\"position:relative;border-radius:10px;overflow:hidden;height:74px;border:1px solid #E4EAED;background-size:cover;background-position:center;{{ dp.style }}\">\n                      <button onclick=\"{{ dp.remove }}\" style=\"position:absolute;top:4px;right:4px;background:rgba(8,16,20,.7);color:#fff;border:none;border-radius:6px;width:22px;height:22px;cursor:pointer;font-size:12px\">\u2715<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"padding:16px 24px;border-top:1px solid #EEF2F4;display:flex;justify-content:flex-end;gap:9px\">\n            <button onclick=\"{{ closeUpload }}\" style=\"background:#fff;border:1px solid #D6DEE2;border-radius:9px;padding:10px 17px;font-weight:600;font-size:13.5px;cursor:pointer\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ saveUpload }}\" style=\"background:{{ saveBg }};color:#fff;border:none;border-radius:9px;padding:10px 18px;font-weight:700;font-size:13.5px;cursor:{{ saveCursor }};font-family:'Archivo'\">{{ saveLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- NEW SHIPMENT MODAL -->\n    <sc-if value=\"{{ newOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ closeNew }}\" style=\"position:fixed;inset:0;z-index:58;background:rgba(8,16,20,.6);display:flex;align-items:center;justify-content:center;padding:32px\">\n        <div onclick=\"{{ stop }}\" style=\"background:#fff;border-radius:18px;width:100%;max-width:680px;max-height:90vh;overflow:auto;box-shadow:0 24px 70px rgba(0,0,0,.3)\">\n          <div style=\"padding:22px 24px;border-bottom:1px solid #EEF2F4;display:flex;justify-content:space-between;align-items:center\">\n            <div>\n              <div style=\"font-family:'Archivo';font-weight:800;font-size:18px\">New shipment<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#74858B;margin-top:3px\">Create a shipment file \u2014 you can add documents and photos to it afterwards.<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ closeNew }}\" style=\"background:#F0F3F5;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:15px;color:#5A6B72\">\u2715<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"padding:22px 24px\">\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n              <sc-for list=\"{{ newFields }}\" as=\"f\" hint-placeholder-count=\"6\">\n                <div style=\"{{ f.wrap }}\">\n                  <label style=\"font-size:12px;font-weight:600;color:#3A4A50\">{{ f.label }}<\u002Flabel>\n                  <sc-if value=\"{{ f.isSelect }}\" hint-placeholder-val=\"{{ false }}\">\n                    <select value=\"{{ f.value }}\" onchange=\"{{ f.onChange }}\" style=\"width:100%;margin-top:6px;padding:11px 12px;border:1.5px solid #D6DEE2;border-radius:10px;font-size:13.5px;background:#fff;outline:none\">\n                      \n                        <option value=\"{{ o.v }}\">{{ o.l }}<\u002Foption>\n                      \n                    <\u002Fselect>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ f.isText }}\" hint-placeholder-val=\"{{ true }}\">\n                    <input value=\"{{ f.value }}\" onchange=\"{{ f.onChange }}\" placeholder=\"{{ f.placeholder }}\" style=\"width:100%;margin-top:6px;padding:11px 12px;border:1.5px solid #D6DEE2;border-radius:10px;font-size:13.5px;outline:none\">\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:16px 24px;border-top:1px solid #EEF2F4;display:flex;justify-content:flex-end;gap:9px\">\n            <button onclick=\"{{ closeNew }}\" style=\"background:#fff;border:1px solid #D6DEE2;border-radius:9px;padding:10px 17px;font-weight:600;font-size:13.5px;cursor:pointer\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ saveNew }}\" style=\"background:{{ newSaveBg }};color:#fff;border:none;border-radius:9px;padding:10px 18px;font-weight:700;font-size:13.5px;cursor:{{ newSaveCursor }};font-family:'Archivo'\">Create shipment<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- DOCUMENT UPLOAD MODAL -->\n    <sc-if value=\"{{ docUploadOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ closeDocUpload }}\" style=\"position:fixed;inset:0;z-index:55;background:rgba(8,16,20,.6);display:flex;align-items:center;justify-content:center;padding:32px\">\n        <div onclick=\"{{ stop }}\" style=\"background:#fff;border-radius:18px;width:100%;max-width:560px;max-height:88vh;overflow:auto;box-shadow:0 24px 70px rgba(0,0,0,.3)\">\n          <div style=\"padding:22px 24px;border-bottom:1px solid #EEF2F4;display:flex;justify-content:space-between;align-items:center\">\n            <div>\n              <div style=\"font-family:'Archivo';font-weight:800;font-size:18px\">Upload documents<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#74858B;margin-top:3px\">{{ sel.fileRef }} \u00b7 {{ sel.title }<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  get IM028_PHOTOS(){\n    if(!this._photos){\n      const el=document.getElementById('tt-photos');\n      this._photos=el?JSON.parse(el.textContent):{};\n    }\n    return this._photos;\n  };\n\n  state = { screen:'login', role:null, view:'list', selId:null, tab:'overview', search:'', commodity:'all', lightbox:null, im028VehicleTab:0, noteDraft:'', notesList:{},\n            uploadOpen:false, draftStage:'On arrival / delivery', draft:[], uploads:{}, dragOver:false,\n            loginPassword:'', loginError:'',\n            trackLine:'MSC', trackContainer:'',\n            docUploadOpen:false, docDraft:[], docUploads:{}, docDragOver:false, docCategory:'Other',\n            customShipments:[], newOpen:false, trackVessel:'', _photosReady:false, aiReport:'', overviewYear:2026, notesDraft:{}, adminPanel:'',\n            nf:{title:'',commodity:'vehicle',client:'',agent:'',pol:'',pod:'',vessel:'',carrier:'MSC',container:'',status:'Booked',etd:'',eta:''} };\n\n  componentDidMount(){\n    try{ const raw=localStorage.getItem('tt_uploads'); if(raw) this.setState({uploads:JSON.parse(raw)}); }catch(e){}\n    try{ const raw=localStorage.getItem('tt_docuploads'); if(raw) this.setState({docUploads:JSON.parse(raw)}); }catch(e){}\n    try{ const raw=localStorage.getItem('tt_shipments'); if(raw) this.setState({customShipments:JSON.parse(raw)}); }catch(e){}\n    try{ const n=localStorage.getItem('tt_notes'); if(n) this.setState({notesList:JSON.parse(n)}); }catch(e){}\n    try{\n      const el=document.getElementById('tt-photos');\n      if(el){ this._photos=JSON.parse(el.textContent); this.setState({_photosReady:true}); }\n    }catch(e){ console.error('[TT] photos:',e); }\n  }\n  persist(uploads){\n    try{ localStorage.setItem('tt_uploads', JSON.stringify(uploads)); }catch(e){}\n  }\n  persistDocs(docUploads){\n    try{ localStorage.setItem('tt_docuploads', JSON.stringify(docUploads)); }catch(e){}\n  }\n  persistShipments(list){\n    try{ localStorage.setItem('tt_shipments', JSON.stringify(list)); }catch(e){}\n  }\n  // ----- downloads -----\n  downloadBlob(name, blob){\n    const url=URL.createObjectURL(blob); const a=document.createElement('a');\n    a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();\n    setTimeout(()=>URL.revokeObjectURL(url),2000);\n  }\n  downloadDataUrl(name, dataUrl){\n    const a=document.createElement('a'); a.href=dataUrl; a.download=name;\n    document.body.appendChild(a); a.click(); a.remove();\n  }\n  makePdf(lines){\n    const esc=s=>String(s).replace(/([()\\\\])/g,'\\\\$1');\n    let content='BT /F1 15 Tf 60 770 Td 22 TL ';\n    lines.forEach(ln=>{ content+='('+esc(ln)+') Tj T* '; });\n    content+='ET';\n    const objs=[\n      '<<\u002FType/Catalog/Pages 2 0 R>>',\n      '<<\u002FType/Pages/Kids[3 0 R]/Count 1>>',\n      '<<\u002FType/Page/Parent 2 0 R/MediaBox[0 0 595 842]/Resources<<\u002FFont<<\u002FF1 5 0 R>>>>/Contents 4 0 R>>',\n      '<<\u002FLength '+content.length+'>>\\nstream\\n'+content+'\\nendstream',\n      '<<\u002FType/Font/Subtype/Type1/BaseFont/Helvetica>>'\n    ];\n    let pdf='%PDF-1.4\\n'; const offs=[];\n    objs.forEach((o,i)=>{ offs.push(pdf.length); pdf+=(i+1)+' 0 obj\\n'+o+'\\nendobj\\n'; });\n    const xref=pdf.length;\n    pdf+='xref\\n0 '+(objs.length+1)+'\\n0000000000 65535 f \\n';\n    offs.forEach(o=>{ pdf+=String(o).padStart(10,'0')+' 00000 n \\n'; });\n    pdf+='trailer\\n<<\u002FSize '+(objs.length+1)+'/Root 1 0 R>>\\nstartxref\\n'+xref+'\\n%%EOF';\n    return new Blob([pdf],{type:'application/pdf'});\n  }\n  downloadDoc(d, fileRef){\n    if(d.dataUrl){ this.downloadDataUrl(d.name, d.dataUrl); return; }\n    const blob=this.makePdf(['TITAN TIDES LOGISTICS (PTY) LTD','Harnessing Strength, Navigating Change','',d.name,'Document type: '+d.category,'Shipment file: '+(fileRef||''),'','This is a sample document generated by the','Titan Tides portal demo. In the live system this','downloads the real file uploaded by Titan Tides or your agent.']);\n    this.downloadBlob(d.name, blob);\n  }\n  readFiles(fileList){\n    const files=[...fileList].filter(f=>f.type.startsWith('image/')).slice(0,12);\n    files.forEach(f=>{\n      const r=new FileReader();\n      r.onload=()=>{ this.setState(s=>({draft:[...s.draft,{url:r.result,name:f.name}]})); };\n      r.readAsDataURL(f);\n    });\n  }\n  readDocFiles(fileList){\n    [...fileList].slice(0,12).forEach(f=>{\n      const r=new FileReader();\n      r.onload=()=>{ this.setState(s=>({docDraft:[...s.docDraft,{name:f.name,size:f.size,type:f.type,url:r.result}]})); };\n      r.readAsDataURL(f);\n    });\n  }\n  fmtSize(b){ if(b==null) return ''; if(b<1024) return b+' B'; if(b<1048576) return (b/1024).toFixed(0)+' KB'; return (b/1048576).toFixed(1)+' MB'; }\n\n  // ----- shipping lines / live tracking -----\n  carriers(){\n    return [\n      {key:'MSC',label:'MSC',color:'#003c71',url:n=>'https://www.msc.com/en/track-a-shipment'+(n?('?agencyPath=msc&trackingNumber='+encodeURIComponent(n)):'')},\n      {key:'Maersk',label:'Maersk',color:'#42b0d5',url:n=>'https://www.maersk.com/tracking/'+encodeURIComponent(n||'')},\n      {key:'Hapag-Lloyd',label:'Hapag-Lloyd',color:'#ff6a00',url:n=>'https://www.hapag-lloyd.com/en/online-business/track/track-by-container-solution.html'+(n?('?container='+encodeURIComponent(n)):'')},\n      {key:'CMA CGM',label:'CMA CGM',color:'#0a2f7a',url:n=>'https://www.cma-cgm.com/ebusiness/tracking/search'+(n?('?SearchBy=Container&Reference='+encodeURIComponent(n)):'')},\n      {key:'Hamburg S\u00fcd',label:'Hamburg S\u00fcd',color:'#e2001a',url:n=>'https://www.hamburgsud-line.com/liner/en/liner_services/ecommerce/track_trace/index.html'},\n      {key:'ONE',label:'Ocean Network Express',color:'#bd0d70',url:n=>'https://ecomm.one-line.com/one-ecom/manage-shipment/cargo-tracking'},\n      {key:'Evergreen',label:'Evergreen',color:'#0a7a3b',url:n=>'https://www.evergreen-line.com/'},\n      {key:'COSCO',label:'COSCO',color:'#c8102e',url:n=>'https://elines.coscoshipping.com/ebusiness/cargoTracking'},\n      {key:'Grimaldi',label:'Grimaldi Lines',color:'#103b8c',url:n=>'https://gnet.grimaldi.napoli.it/GnetCMSWeb/'},\n      {key:'H\u00f6egh Autoliners',label:'H\u00f6egh Autoliners',color:'#003478',url:n=>'https://www.hoeghautoliners.com/'}\n    ];\n  }\n  carrierFor(s){\n    if(s.carrier) return s.carrier;\n    const m={a:'Hapag-Lloyd',b:'H\u00f6egh Autoliners',c:'MSC',d:'Grimaldi',e:'Hamburg S\u00fcd',f:'Hamburg S\u00fcd'};\n    return m[s.id]||'MSC';\n  }\n  mapHrefFor(vessel){\n    const v=String(vessel||'').replace(/^MV\\s+/i,'').trim();\n    return 'https://www.marinetraffic.com/en/ais/index/search/all?keyword='+encodeURIComponent(v);\n  }\n  trackHrefFor(line, container){\n    const c=this.carriers().find(x=>x.key===line);\n    const num=(container||'').replace(/\\s+/g,'');\n    if(c) return c.url(num);\n    return 'https://www.google.com/search?q='+encodeURIComponent('track '+line+' '+num);\n  }\n  docObj(name,ext,cat,size,mod){\n    const catBg={'Bill of Lading':'#EEE8FB','Invoice':'#FDF0E3','Customs':'#E6F5EC','Check sheet':'#E7F4FA','Packing':'#F0F3F5','Other':'#EAF3FD'};\n    const catColor={'Bill of Lading':'#6B4FC7','Invoice':'#C2772A','Customs':'#2BA66A','Check sheet':'#1391B8','Packing':'#5A6B72','Other':'#1391B8'};\n    return {name,ext,size,category:cat,modified:mod,\n      iconBg: ext==='PDF'?'#FDECEC':(ext==='ZIP'?'#EAF3FD':'#EAF8F0'),\n      iconColor: ext==='PDF'?'#D14343':(ext==='ZIP'?'#1391B8':'#2BA66A'),\n      catBg:catBg[cat]||'#F0F3F5', catColor:catColor[cat]||'#5A6B72'};\n  }\n\n  // ----- palette helpers -----\n  P(){ return { accent:'#1FA9D1', ink:'#0F1A1F' }; }\n  statusInfo(s){\n    const m={\n      'Booked':'#8A6FE0','Collected':'#E08A3C','At origin port':'#D6A21E',\n      'On vessel':'#1FA9D1','In transit':'#1391B8','Arrived':'#2BA66A',\n      'Cleared':'#2BA66A','Delivered':'#46A05A'\n    };\n    return m[s]||'#1FA9D1';\n  }\n  hero(commodity){\n    const map={\n      vehicle:'linear-gradient(135deg,#1b2f38,#0f1a1f)',\n      general:'linear-gradient(135deg,#143b46,#0f2127)',\n      machinery:'linear-gradient(135deg,#2a2330,#15131a)',\n      effects:'linear-gradient(135deg,#16323a,#0f2127)',\n      reefer:'linear-gradient(135deg,#103b3a,#0f2127)'\n    };\n    const base = map[commodity]||map.general;\n    return 'background:'+base;\n  }\n  tile(seed){\n    const hue=(seed*47)%360;\n    return `background:linear-gradient(135deg,hsl(${hue} 32% 58%),hsl(${(hue+40)%360} 38% 38%));background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.10) 0 10px,transparent 10px 20px),linear-gradient(135deg,hsl(${hue} 32% 56%),hsl(${(hue+40)%360} 40% 36%))`;\n  }\n  icon(c){ return {vehicle:'\ud83d\ude97',general:'\ud83d\udce6',machinery:'\u2699\ufe0f',effects:'\ud83c\udfe0',reefer:'\u2744\ufe0f'}[c]||'\ud83d\udce6'; }\n  cLabel(c){ return {vehicle:'Vehicle',general:'General cargo',machinery:'Machinery',effects:'Personal effects',reefer:'Reefer'}[c]||'Cargo'; }\n\n  data(){\n    return this.seed().concat(this.state.customShipments||[]);\n  }\n  seed(){\n    if(this._d) return this._d;\n    const mk=(o)=>o;\n    this._d=[\n      mk({id:'a',fileRef:'TT-2026-0418',commodity:'vehicle',title:'Land Rover Defender 110',pol:'Cape Town',pod:'Southampton',vessel:'MV Maipo',etd:'12 Apr 2026',eta:'27 May 2026',status:'On vessel',progress:55,\n        client:'Acme Imports',agent:'Cape Reading Agency',container:'TCLU 227 8853',seal:'ML-ZA6658118',bl:'CRA260554826',pol2:'CAPE TOWN',pod2:'SOUTHAMPTON',contType:\"1 \u00d7 20' Container\",\n        collFrom:'P&M Packing, Cape Town',deliverTo:'A. Meadows, Debach UK',vehicle:{make:'Land Rover',model:'Defender 110',year:'2022',chassis:'SALLDHMR7GA480249',engine:'2.0L D240',colour:'Santorini Black'},\n        docs:5,photos:8}),\n      mk({id:'b',fileRef:'TT-2026-0392',commodity:'vehicle',title:'Porsche 911 Carrera S',pol:'Durban',pod:'Felixstowe',vessel:'MV H\u00f6egh Trove',etd:'02 Mar 2026',eta:'09 Apr 2026',status:'In transit',progress:68,\n        client:'Acme Imports',agent:'Cape Reading Agency',container:'RORO',seal:'\u2014',bl:'CRA251154111',pol2:'DURBAN',pod2:'FELIXSTOWE',contType:'RoRo',\n        collFrom:'Pristine Classic Cars',deliverTo:'M. Palmer, Cape Town',vehicle:{make:'Porsche',model:'911 Carrera S',year:'2021',chassis:'WP0ZZZ99ZMS210447',engine:'3.0L Twin-Turbo',colour:'Guards Red'},\n        docs order-radius:14px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:90px 1fr 90px 90px 70px;gap:10px;padding:11px 18px;border-bottom:1px solid #E4EAED;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#74858B\">\n            <div>Ref<\u002Fdiv><div>Shipment<\u002Fdiv><div>Revenue<\u002Fdiv><div>Costs<\u002Fdiv><div>Profit<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ allShipFin.rows }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid;grid-template-columns:90px 1fr 90px 90px 70px;gap:10px;align-items:center;padding:11px 18px;border-bottom:1px solid #F5F7F8;font-size:13px\">\n              <div style=\"font-weight:600;color:#1391B8\">{{ r.fileRef }}<\u002Fdiv>\n              <div style=\"color:#33454C\">{{ r.title }}<\u002Fdiv>\n              <div style=\"color:#0F1A1F\">{{ r.revFmt }}<\u002Fdiv>\n              <div style=\"color:#74858B\">{{ r.costFmt }}<\u002Fdiv>\n              <div style=\"font-weight:700;color:#2BA66A\">{{ r.profitFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Shipment Overview by Month -->\n      <div style=\"margin-bottom:40px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px\">\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:20px;color:#0F1A1F\">Shipment Overview<\u002Fdiv>\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n            <sc-for list=\"{{ overview.yrs }}\" as=\"y\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ onOvYear(y) }}\" style=\"padding:6px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid {{ y===overviewYear ? '#0F1A1F' : '#D6DEE2' }};background:{{ y===overviewYear ? '#0F1A1F' : '#fff' }};color:{{ y===overviewYear ? '#fff' : '#33454C' }}\">{{ y }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px\">\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:14px;padding:18px 20px\">\n            <div style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#74858B;margin-bottom:4px\">Total Shipments<\u002Fdiv>\n            <div style=\"font-size:26px;font-weight:800;color:#0F1A1F\">{{ overview.total }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:14px;padding:18px 20px\">\n            <div style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#74858B;margin-bottom:4px\">Active<\u002Fdiv>\n            <div style=\"font-size:26px;font-weight:800;color:#1391B8\">{{ overview.active }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:14px;padding:18px 20px\">\n            <div style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#74858B;margin-bottom:4px\">Delivered<\u002Fdiv>\n            <div style=\"font-size:26px;font-weight:800;color:#2BA66A\">{{ overview.delivered }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#0F1A1F;border-radius:14px;padding:18px 20px\">\n            <div style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.55);margin-bottom:4px\">Year<\u002Fdiv>\n            <div style=\"font-size:26px;font-weight:800;color:#fff\">{{ overviewYear }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:16px;overflow:hidden\">\n          <div style=\"padding:14px 20px;border-bottom:1px solid #E4EAED;font-weight:700;font-size:13.5px\">Monthly Breakdown<\u002Fdiv>\n          <sc-for list=\"{{ overview.byMonth }}\" as=\"m\" hint-placeholder-count=\"4\">\n            <div style=\"display:grid;grid-template-columns:80px 1fr 60px;align-items:center;gap:16px;padding:13px 20px;border-bottom:1px solid #F5F7F8\">\n              <div style=\"font-weight:600;font-size:13px;color:#33454C\">{{ m.month }}<\u002Fdiv>\n              <div style=\"display:flex;gap:4px;align-items:center;height:18px\">\n                <div style=\"height:18px;background:#1391B8;border-radius:3px;width:{{ m.active * 28 }}px;min-width:{{ m.active > 0 ? 4 : 0 }}px\"><\u002Fdiv>\n                <div style=\"height:18px;background:#2BA66A;border-radius:3px;width:{{ m.delivered * 28 }}px;min-width:{{ m.delivered > 0 ? 4 : 0 }}px\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:12px;color:#74858B;text-align:right\">{{ m.count }} shipment{{ m.count===1?'':'s' }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:16px;margin-top:10px;padding:0 4px\">\n          <div style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#74858B\"><span style=\"width:12px;height:12px;border-radius:2px;background:#1391B8;display:inline-block\"><\u002Fspan>Active<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#74858B\"><span style=\"width:12px;height:12px;border-radius:2px;background:#2BA66A;display:inline-block\"><\u002Fspan>Delivered<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- AI Report Section -->\n      <div style=\"background:#fff;border:1px solid #E4EAED;border-radius:20px;padding:28px 32px\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:6px\">\n          <div style=\"width:36px;height:36px;border-radius:10px;background:#0F1A1F;display:flex;align-items:center;justify-content:center\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5\" stroke=\"#1FA9D1\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-family:'Archivo';font-weight:700;font-size:18px;color:#0F1A1F\">Portfolio Report<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:13px;color:#74858B;margin-bottom:20px\">Analyses your full shipment portfolio and produces a formatted executive summary \u2014 no internet connection required<\u002Fdiv>\n        <div style=\"margin-bottom:20px\">\n          <button onclick=\"{{ onGenerateAi }}\" style=\"padding:11px 26px;background:#1FA9D1;color:#fff;border:none;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer;margin-right:10px\">Generate Report<\u002Fbutton><button onclick=\"{{ onPrintReport }}\" style=\"padding:11px 22px;background:#fff;color:#0F1A1F;border:1.5px solid #D6DEE2;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer\">Print / Save PDF<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ aiReport }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#F7F9FA;border:1px solid #E4EAED;border-radius:14px;padding:20px 24px;font-size:13.5px;line-height:1.7;color:#0F1A1F;white-space:pre-wrap\">{{ aiReport }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <\u002Fsc-if>\n\n<\u002Fbody><\u002Fhtml>"</script>
</body>
</html>
